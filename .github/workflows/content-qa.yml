name: content-qa

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  structure:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate canonical IDs, paths, mappings, and links
        run: python3 curriculum/tools/validate.py

  book:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.7.33"
      - name: Render the book
        run: quarto render curriculum/book --to html
