<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="white"/>
  <g font-family="sans-serif" fill="#111">
    <g fill="#f2f2f2" stroke="#111" stroke-width="2">
      <rect x="50" y="55" width="330" height="135" rx="12"/>
      <rect x="435" y="55" width="330" height="135" rx="12"/>
      <rect x="820" y="55" width="330" height="135" rx="12"/>
      <rect x="820" y="330" width="330" height="135" rx="12"/>
      <rect x="435" y="330" width="330" height="135" rx="12"/>
    </g>

    <g font-size="22" text-anchor="middle">
      <text x="215" y="108">
        <tspan x="215" dy="0">Join p-type and n-type</tspan>
        <tspan x="215" dy="34">regions</tspan>
      </text>
      <text x="600" y="82">
        <tspan x="600" dy="0">Concentration gradients</tspan>
        <tspan x="600" dy="30">drive diffusion and</tspan>
        <tspan x="600" dy="30">recombination</tspan>
      </text>
      <text x="985" y="108">
        <tspan x="985" dy="0">Fixed ions form depletion</tspan>
        <tspan x="985" dy="34">space charge</tspan>
      </text>
      <text x="985" y="383">
        <tspan x="985" dy="0">Built-in field drives drift</tspan>
        <tspan x="985" dy="34">against diffusion</tspan>
      </text>
      <text x="600" y="383">
        <tspan x="600" dy="0">Equilibrium: zero net</tspan>
        <tspan x="600" dy="34">terminal current</tspan>
      </text>
    </g>

    <g fill="none" stroke="#111" stroke-width="4" marker-end="url(#arrow)">
      <line x1="380" y1="122" x2="425" y2="122"/>
      <line x1="765" y1="122" x2="810" y2="122"/>
      <line x1="985" y1="190" x2="985" y2="320"/>
      <line x1="820" y1="397" x2="775" y2="397"/>
    </g>
  </g>
</svg>
