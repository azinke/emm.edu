<svg xmlns="http://www.w3.org/2000/svg" width="820" height="470"
     viewBox="0 0 820 470" role="img"
     aria-labelledby="title desc">
  <title id="title">Transfer path of an inverting Schmitt trigger</title>
  <desc id="desc">Output voltage is plotted against input voltage. On a rising
  input sweep the output stays high until upper threshold V T H and then
  switches low. On a falling sweep it stays low until lower threshold V T L
  and then switches high. Arrows and different line styles identify both
  paths.</desc>
  <defs>
    <marker id="arrowSolid" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#155a8a"/>
    </marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b3a3a"/>
    </marker>
    <style>
      .axis { stroke:#222; stroke-width:2; fill:none; }
      .guide { stroke:#888; stroke-width:1; stroke-dasharray:5 6; }
      .rise { stroke:#155a8a; stroke-width:4; fill:none;
              marker-end:url(#arrowSolid); }
      .fall { stroke:#8b3a3a; stroke-width:4; stroke-dasharray:10 7;
              fill:none; marker-end:url(#arrowDash); }
      text { font-family:Arial, Helvetica, sans-serif; fill:#222; font-size:19px; }
      .small { font-size:16px; }
      .label { font-weight:600; }
    </style>
  </defs>
  <path class="axis" d="M 95 45 V 405 H 770"/>
  <text x="24" y="55" class="label">v<tspan baseline-shift="sub">o</tspan></text>
  <text x="775" y="414" class="label">v<tspan baseline-shift="sub">in</tspan></text>
  <path class="guide" d="M 95 105 H 750"/>
  <path class="guide" d="M 95 350 H 750"/>
  <text x="25" y="112">V<tspan baseline-shift="sub">OH</tspan></text>
  <text x="25" y="357">V<tspan baseline-shift="sub">OL</tspan></text>

  <path class="guide" d="M 330 80 V 405"/>
  <path class="guide" d="M 565 80 V 405"/>
  <text x="302" y="438">V<tspan baseline-shift="sub">T,L</tspan></text>
  <text x="537" y="438">V<tspan baseline-shift="sub">T,H</tspan></text>

  <!-- Rising input: high state, downward switch, low state. -->
  <path class="rise" d="M 135 105 H 565 V 350 H 720"/>
  <text x="430" y="84" class="label">input rising</text>

  <!-- Falling input: low state, upward switch, high state. -->
  <path class="fall" d="M 700 350 H 330 V 105 H 150"/>
  <text x="390" y="382" class="label">input falling</text>

  <path class="axis" d="M 330 275 H 565"
        marker-start="url(#arrowSolid)" marker-end="url(#arrowSolid)"/>
  <text x="382" y="263" class="small">hysteresis width ΔV<tspan baseline-shift="sub">T</tspan></text>
  <text x="196" y="463" class="small">
    solid and dashed paths distinguish sweep direction; levels are load dependent
  </text>
</svg>
