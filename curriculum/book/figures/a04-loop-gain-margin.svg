<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540"
     viewBox="0 0 900 540" role="img"
     aria-labelledby="title desc">
  <title id="title">Conceptual loop-gain crossover and phase margin</title>
  <desc id="desc">Two aligned logarithmic-frequency plots. The upper plot
  shows solid open-loop gain falling through a dashed horizontal noise-gain
  line at crossover frequency f c. The lower plot shows loop phase at that
  frequency and the remaining angle to minus 180 degrees, which is phase
  margin.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
    <style>
      .axis { stroke:#222; stroke-width:2; fill:none; }
      .grid { stroke:#999; stroke-width:1; stroke-dasharray:5 6; fill:none; }
      .open { stroke:#155a8a; stroke-width:4; fill:none; }
      .noise { stroke:#8b3a3a; stroke-width:3; stroke-dasharray:10 7; fill:none; }
      .phase { stroke:#155a8a; stroke-width:4; fill:none; }
      .margin { stroke:#222; stroke-width:2; fill:none;
                marker-start:url(#arrow); marker-end:url(#arrow); }
      text { font-family:Arial, Helvetica, sans-serif; fill:#222; font-size:18px; }
      .small { font-size:16px; }
      .label { font-weight:600; }
    </style>
  </defs>

  <!-- Common frequency axis and crossover guide. -->
  <path class="grid" d="M 625 45 V 480"/>
  <text x="610" y="515" class="label">f<tspan baseline-shift="sub">c</tspan></text>

  <!-- Magnitude panel. -->
  <path class="axis" d="M 90 40 V 255 H 845"/>
  <text x="18" y="62" class="label">magnitude</text>
  <text x="42" y="84" class="small">(dB)</text>
  <text x="855" y="261">f</text>
  <path class="grid" d="M 90 230 H 845"/>
  <text x="52" y="236" class="small">0</text>
  <path class="open"
        d="M 110 65 L 520 150 Q 600 168 625 175
           Q 700 205 735 252"/>
  <path class="noise" d="M 110 175 H 815"/>
  <circle cx="625" cy="175" r="6" fill="#222"/>
  <text x="180" y="90" class="label">open-loop gain |A|</text>
  <text x="655" y="158" class="label">noise gain 1/|β|</text>
  <text x="650" y="211" class="small">|T| = 1</text>

  <!-- Phase panel. -->
  <path class="axis" d="M 90 300 V 480 H 845"/>
  <text x="20" y="320" class="label">loop phase</text>
  <text x="48" y="342" class="small">(degrees)</text>
  <text x="855" y="486">f</text>
  <path class="grid" d="M 90 458 H 845"/>
  <text x="32" y="464" class="small">−180°</text>
  <path class="phase"
        d="M 110 338 Q 430 350 540 378
           Q 600 394 625 408 Q 710 448 815 467"/>
  <circle cx="625" cy="408" r="6" fill="#222"/>
  <path class="margin" d="M 625 416 V 455"/>
  <text x="645" y="438" class="label">phase margin</text>
  <text x="505" y="398" class="small">∠T at f<tspan baseline-shift="sub">c</tspan></text>
  <text x="278" y="526" class="small">
    conceptual logarithmic frequency; curves are not device data
  </text>
</svg>
