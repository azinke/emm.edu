<svg xmlns="http://www.w3.org/2000/svg" width="820" height="470"
     viewBox="0 0 820 470" role="img"
     aria-labelledby="title desc">
  <title id="title">Bounded open-loop op-amp transfer</title>
  <desc id="desc">Absolute output voltage versus differential-input departure
  from its selected quiescent value. A very steep central line crosses
  quiescent output V O Q and connects lower and upper output limiting regions.
  The central linear differential-input interval is narrow and the loaded
  output levels need not equal the supply rails.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
    <style>
      .axis { stroke:#222; stroke-width:2; fill:none; }
      .curve { stroke:#155a8a; stroke-width:4; fill:none; }
      .guide { stroke:#888; stroke-width:1; stroke-dasharray:5 6; }
      .span { stroke:#222; stroke-width:2; fill:none;
              marker-start:url(#arrow); marker-end:url(#arrow); }
      text { font-family:Arial, Helvetica, sans-serif; fill:#222; font-size:19px; }
      .small { font-size:16px; }
      .label { font-weight:600; }
    </style>
  </defs>
  <path class="axis" d="M 90 35 V 410 H 770"/>
  <path class="axis" d="M 90 225 H 770"/>
  <text x="28" y="48" class="label">v<tspan baseline-shift="sub">o</tspan></text>
  <text x="683" y="255" class="label">v<tspan baseline-shift="sub">d</tspan> − V<tspan baseline-shift="sub">dQ</tspan></text>

  <path class="guide" d="M 90 88 H 755"/>
  <path class="guide" d="M 90 365 H 755"/>
  <text x="18" y="95">V<tspan baseline-shift="sub">OH</tspan></text>
  <text x="18" y="232">V<tspan baseline-shift="sub">OQ</tspan></text>
  <text x="18" y="372">V<tspan baseline-shift="sub">OL</tspan></text>
  <path class="curve"
        d="M 120 365 H 382 L 448 88 H 740"/>
  <text x="520" y="70" class="small">loaded upper limit</text>
  <text x="125" y="394" class="small">loaded lower limit</text>
  <text x="458" y="183" class="label">slope A<tspan baseline-shift="sub">OL</tspan></text>
  <circle cx="415" cy="225" r="4" fill="#222"/>
  <path class="axis" d="M 415 219 V 231"/>
  <text x="409" y="252" class="small">0</text>

  <path class="guide" d="M 382 205 V 402"/>
  <path class="guide" d="M 448 69 V 402"/>
  <path class="span" d="M 386 402 H 444"/>
  <text x="285" y="435" class="small">
    narrow linear interval, approximately (V<tspan baseline-shift="sub">OH</tspan>−V<tspan baseline-shift="sub">OL</tspan>)/A<tspan baseline-shift="sub">OL</tspan>
  </text>
  <text x="132" y="28" class="small">
    conceptual transfer; limits depend on supply, load and temperature
  </text>
</svg>
