<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="670" viewBox="0 0 1000 670" role="img" aria-labelledby="title desc">
  <title id="title">Worked loop-gain comparison before and after a load pole</title>
  <desc id="desc">Two logarithmic-frequency plots show return-ratio magnitude and continuous phase. A two-pole loop crosses zero decibels near 91 kilohertz with about 66 degrees phase margin. Adding a 30 kilohertz load pole moves crossover near 50 kilohertz and reduces phase margin to about 17 degrees. The curves are calculated from the transfer functions stated in the text.</desc>
  <style>
    .axis{stroke:#222;stroke-width:2;fill:none}.grid{stroke:#bbb;stroke-width:1;stroke-dasharray:5 5}
    .base{stroke:#2369a1;stroke-width:4;fill:none}.load{stroke:#c53d35;stroke-width:4;fill:none}
    .mark1{fill:#2369a1}.mark2{fill:#c53d35} text{font-family:Arial,sans-serif;fill:#222;font-size:18px}
    .small{font-size:16px}.label{font-weight:700;font-size:21px}
  </style>
  <defs>
    <clipPath id="mag-clip"><rect x="88" y="53" width="834" height="254"/></clipPath>
  </defs>
  <text x="500" y="28" text-anchor="middle" class="label">Calculated return ratio</text>
  <line x1="90" y1="55" x2="90" y2="305" class="axis"/>
  <line x1="90" y1="220" x2="920" y2="220" class="axis"/>
  <line x1="90" y1="70" x2="920" y2="70" class="grid"/>
  <line x1="90" y1="145" x2="920" y2="145" class="grid"/>
  <line x1="90" y1="295" x2="920" y2="295" class="grid"/>
  <text x="76" y="75" text-anchor="end" class="small">60</text>
  <text x="76" y="150" text-anchor="end" class="small">30</text>
  <text x="76" y="225" text-anchor="end" class="small">0 dB</text>
  <text x="76" y="300" text-anchor="end" class="small">−30</text>
  <text x="25" y="180" text-anchor="middle" transform="rotate(-90 25 180)">|T| (dB)</text>
  <polyline points="90,77 189,95 298,120 397,144 505,170 604,194 667,206 725,220 735,222 786,243 920,285" class="base" clip-path="url(#mag-clip)"/>
  <polyline points="90,77 189,95 298,120 397,145 505,171 604,202 667,220 725,245 735,250 786,284 920,360" class="load" clip-path="url(#mag-clip)"/>
  <circle cx="725" cy="220" r="7" class="mark1"/>
  <circle cx="667" cy="220" r="7" class="mark2"/>
  <text x="735" y="206" class="small">91 kHz</text>
  <text x="580" y="242" class="small">50 kHz</text>

  <line x1="90" y1="355" x2="90" y2="605" class="axis"/>
  <line x1="90" y1="355" x2="920" y2="355" class="axis"/>
  <line x1="90" y1="505" x2="920" y2="505" class="grid"/>
  <text x="76" y="365" text-anchor="end" class="small">−45°</text>
  <text x="76" y="435" text-anchor="end" class="small">−90°</text>
  <text x="76" y="510" text-anchor="end" class="small">−180°</text>
  <text x="76" y="590" text-anchor="end" class="small">−270°</text>
  <text x="25" y="480" text-anchor="middle" transform="rotate(-90 25 480)">∠T</text>
  <polyline points="90,355 189,375 298,399 397,404 505,407 604,414 667,422 725,432 735,437 786,457 920,496" class="base"/>
  <polyline points="90,355 189,375 298,401 397,408 505,426 604,474 667,491 725,515 735,522 786,552 920,590" class="load"/>
  <line x1="725" y1="432" x2="725" y2="505" class="base"/>
  <line x1="667" y1="491" x2="667" y2="505" class="load"/>
  <text x="738" y="474" class="small">φₘ ≈ 66°</text>
  <text x="548" y="493" class="small">φₘ ≈ 17°</text>

  <line x1="145" y1="628" x2="180" y2="628" class="base"/>
  <text x="190" y="634">two-pole loop</text>
  <line x1="440" y1="628" x2="475" y2="628" class="load"/>
  <text x="485" y="634">with 30 kHz load pole</text>
  <text x="90" y="660" text-anchor="middle" class="small">100 Hz</text>
  <text x="298" y="660" text-anchor="middle" class="small">1 kHz</text>
  <text x="505" y="660" text-anchor="middle" class="small">10 kHz</text>
  <text x="712" y="660" text-anchor="middle" class="small">100 kHz</text>
  <text x="920" y="660" text-anchor="middle" class="small">1 MHz</text>
</svg>
