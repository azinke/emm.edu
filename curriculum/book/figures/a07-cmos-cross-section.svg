<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520"
     viewBox="0 0 1000 520" role="img"
     aria-labelledby="title desc">
  <title id="title">Conceptual bulk CMOS cross-section</title>
  <desc id="desc">Not-to-scale cross-section with an nMOS in p-type substrate
  and a pMOS in an n-well. It labels gates, oxide, source and drain diffusions,
  body ties, contacts, metal, and reverse-biased isolation junctions.</desc>
  <defs>
    <pattern id="pfill" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0 10 L10 0" stroke="#777" stroke-width="1"/>
    </pattern>
    <pattern id="nfill" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0 0 L10 10" stroke="#777" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1000" height="520" fill="white"/>
  <rect x="40" y="190" width="920" height="280" fill="#f4f4f4"
        stroke="#111" stroke-width="3"/>
  <rect x="520" y="190" width="430" height="250" fill="url(#nfill)"
        stroke="#111" stroke-width="2"/>
  <text x="110" y="435" font-family="sans-serif" font-size="20">
    p-type substrate / nMOS body
  </text>
  <text x="635" y="415" font-family="sans-serif" font-size="20">n-well / pMOS body</text>

  <g fill="url(#nfill)" stroke="#111" stroke-width="2">
    <rect x="130" y="190" width="110" height="80"/>
    <rect x="350" y="190" width="110" height="80"/>
    <rect x="910" y="190" width="35" height="80"/>
  </g>
  <g fill="url(#pfill)" stroke="#111" stroke-width="2">
    <rect x="565" y="190" width="110" height="80"/>
    <rect x="785" y="190" width="110" height="80"/>
    <rect x="55" y="190" width="35" height="80"/>
  </g>
  <rect x="260" y="172" width="70" height="18" fill="#fff" stroke="#111"/>
  <rect x="695" y="172" width="70" height="18" fill="#fff" stroke="#111"/>
  <rect x="270" y="130" width="50" height="42" fill="#999" stroke="#111"/>
  <rect x="705" y="130" width="50" height="42" fill="#999" stroke="#111"/>
  <text x="270" y="118" font-family="sans-serif" font-size="18">nMOS gate</text>
  <text x="705" y="118" font-family="sans-serif" font-size="18">pMOS gate</text>
  <path d="M295 190 V310 H250" stroke="#111" stroke-width="2" fill="none"/>
  <text x="135" y="318" font-family="sans-serif" font-size="17">thin gate oxide</text>

  <g stroke="#111" stroke-width="8">
    <path d="M185 190 V92 H140"/>
    <path d="M405 190 V92 H450"/>
    <path d="M620 190 V92 H575"/>
    <path d="M840 190 V92 H885"/>
    <path d="M75 190 V92 H100"/>
    <path d="M930 190 V92 H955"/>
  </g>
  <g font-family="sans-serif" font-size="17" text-anchor="middle">
    <text x="150" y="75">nMOS S</text>
    <text x="430" y="75">nMOS D</text>
    <text x="590" y="75">pMOS S</text>
    <text x="865" y="75">pMOS D</text>
    <text x="88" y="45">p+ body tie</text>
    <text x="925" y="45">n+ well tie</text>
  </g>
  <path d="M500 55 L500 92" stroke="#111" stroke-width="2"/>
  <text x="500" y="35" font-family="sans-serif" font-size="17"
        text-anchor="middle">metal and vertical contacts</text>
  <text x="500" y="505" font-family="sans-serif" font-size="22"
        text-anchor="middle">
    Conceptual only—not a process drawing and not to scale
  </text>
</svg>
