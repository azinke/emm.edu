version = 1

[[circuit]]
id = "d01-bipolar-logic"
source = "d01-bipolar-logic.tex"
chapter_id = "D01"
caption = "Resistor-transistor logic exposes the simplest bipolar realization of inversion. One NPN transistor forms an inverter; two collector-connected NPN pull-down branches form a NOR gate. The collector resistor supplies the released high state, while any conducting transistor establishes the low state."
alt = "Panel a shows an RTL inverter: V CC feeds output Y through collector resistor R C, NPN transistor Q1 pulls Y to ground, and input A drives its base through R B. Panel b shows an RTL NOR: V CC feeds Y through R C, and either of two NPN transistors can pull Y to ground; A and B drive their bases through separate resistors."

[[circuit]]
id = "d01-cmos-logic"
source = "d01-cmos-logic.tex"
chapter_id = "D01"
caption = "Complementary CMOS realizes inversion and NAND by arranging pMOS pull-up paths and nMOS pull-down paths as dual networks. The drawings show the DC conduction paths used for logical reasoning; body connections, load capacitance, interconnect resistance, and protection structures remain part of a physical implementation."
alt = "Panel a shows a CMOS inverter with a pMOS transistor from V DD to output Y and an nMOS transistor from Y to ground, both gates driven by A. Panel b shows a two-input CMOS NAND: two pMOS transistors in parallel connect V DD to Y, and two nMOS transistors in series connect Y to ground; inputs A and B each drive one pMOS and one nMOS."

[[circuit]]
id = "d01-open-drain-node"
source = "d01-open-drain-node.tex"
chapter_id = "D01"
caption = "Two open-drain outputs share one pulled-up node. Either transistor can assert the active-low signal by sinking current; only the pull-up can establish the released high state. The receiver, both leakage paths, wiring capacitance, and pull-up resistance determine the valid levels and rise time."
alt = "A pull-up resistor connects V DD to active-low shared node REQ. Two n-channel MOSFET drains and one receiver input connect to that node. Each MOSFET source returns to ground and has its own control input. Current through the pull-up flows downward when either transistor turns on."

[[circuit]]
id = "a08-led-photodiode-interface"
source = "a08-led-photodiode-interface.tex"
chapter_id = "A08"
caption = "The switched indicator routes source current through a limiting resistor, LED, and low-side transistor to the source return. The photodiode returns to the same V REF node that biases the op-amp non-inverting input, so the TIA holds the diode near zero bias; parallel R F and C F set low-frequency transimpedance and shape the feedback loop. Op-amp supply pins are omitted but remain part of the range and power checks."
alt = "Panel a shows source V S feeding a resistor, LED, and NPN low-side transistor in series. A driver reaches the transistor base through a resistor. Panel b shows a photodiode between the op-amp inverting input and V REF, the non-inverting input connected to V REF, and parallel feedback resistor R F and capacitor C F from output to inverting input."

[[circuit]]
id = "a08-photoresistor-divider"
source = "a08-photoresistor-divider.tex"
chapter_id = "A08"
caption = "A photoresistor requires an external excitation and readout circuit. With the LDR in the lower divider leg, increasing illumination normally reduces its resistance and therefore lowers V O. The receiving input appears as finite resistance R IN and acquisition capacitance C IN; swapping the fixed resistor and LDR reverses the voltage response."
alt = "Supply V S drives fixed resistor R S and then a light-dependent resistor to ground. Their junction is test point TP LDR and output V O. An ADC or comparator input is represented by resistance R IN and capacitance C IN from the output to ground. Arrows illuminate the photoresistor, and divider current flows through both divider elements."

[[circuit]]
id = "a08-optocoupler-interface"
source = "a08-optocoupler-interface.tex"
chapter_id = "A08"
caption = "The input domain routes V IN through R IN and the optocoupler LED to TP0A. Light crosses the drawn barrier; the separate output domain routes V OUT through R PU and the phototransistor to TP0B. The separate references express galvanic separation but do not establish an insulation rating."
alt = "An input source and resistor drive an LED on the left. Light arrows cross a dashed insulation barrier to a phototransistor on the right. A separate output supply and pull-up resistor feed the collector and output test point. Input and output grounds are separate."

[[circuit]]
id = "a07-cmos-inverter-switch"
source = "a07-cmos-inverter-switch.tex"
chapter_id = "A07"
caption = "Complementary CMOS building blocks: an inverter drives a lumped load capacitance, while a transmission gate uses parallel nMOS and pMOS devices controlled by complementary signals to pass either signal polarity. The nMOS bodies are tied to the lower rail and pMOS bodies to V DD; those body connections are declared rather than drawn."
alt = "Panel a shows a pMOS transistor from V DD to output and an nMOS transistor from output to ground. Their gates share input TPIN, their drains share output TPO, and load capacitance C L connects output to ground. Panel b shows nMOS and pMOS devices in parallel between TPA and TPB; phi drives the nMOS gate and complement phi drives the pMOS gate."

[[circuit]]
id = "a07-five-transistor-ota"
source = "a07-five-transistor-ota.tex"
chapter_id = "A07"
caption = "A five-transistor CMOS operational transconductance amplifier. The nMOS differential pair steers tail current, the pMOS current-mirror active load converts differential branch-current change to a single-ended output, and the nMOS tail device establishes bias. All nMOS bodies are tied to the lower rail and pMOS bodies to V DD; those body connections are declared rather than drawn."
alt = "Matched nMOS input transistors M1 and M2 share a source node. Tail transistor M5 sinks their shared current to the lower rail; V BIAS drives its gate. Their input gates are test points TPP and TPN. P-channel transistors M3 and M4 form a high-side current mirror load connected to V DD. M2 and M4 drains form output TPO and drive load capacitance C L."

[[circuit]]
id = "a07-two-stage-incremental"
source = "a07-two-stage-incremental.tex"
chapter_id = "A07"
caption = "A two-stage incremental amplifier representation about its quiescent point. The first transconductance drives high-impedance node TPX, the inverting second transconductance drives output TPO, and compensation capacitance C C connects output to TPX. Every ground symbol is AC reference, not an omitted DC bias path."
alt = "Differential input v d controls current G m1 v d into node TPX. R1 and C1 connect TPX to AC reference. TPX controls a downward current g m2 v x at output TPO. R2 and combined C2 plus C L connect output to AC reference. Compensation capacitor C C connects output back to TPX."

[[circuit]]
id = "a06-noise-budget-amplifier"
source = "a06-noise-budget-amplifier.tex"
chapter_id = "A06"
caption = "A non-inverting amplifier and post-amplifier RC low-pass with every first-order source used in the white-noise budget: source resistance, op-amp voltage and current noise, feedback-resistor thermal noise, and output-filter resistor thermal noise."
alt = "A voltage source v s and source resistance R S drive the non-inverting input of op amp U1. Feedback resistor R F connects the unfiltered output TPU to the inverting node, and R G connects that node to TP0. Series resistor R LP and shunt capacitor C LP form a post-amplifier low-pass from TPU to filtered output TPO. Labels identify thermal noise and equivalent op-amp voltage and current noise."

[[circuit]]
id = "a06-parasitic-feedback"
source = "a06-parasitic-feedback.tex"
chapter_id = "A06"
caption = "A non-inverting amplifier with an unintended capacitive path from output to the source-side input node. The parasitic path and shared physical return can alter the complete loop even though neither appears in the intended feedback ratio."
alt = "A voltage source and source resistance drive the non-inverting input of op amp U1. R F and R G form the intended negative-feedback network. A dashed path containing parasitic capacitance C P returns from the output to the source-side non-inverting input node, showing unintended frequency-dependent feedback."

[[circuit]]
id = "a03-common-emitter-amplifier"
source = "a03-common-emitter-amplifier.tex"
chapter_id = "A03"
caption = "A voltage-divider-biased common-emitter stage with split emitter degeneration, coupling capacitors, a bypass capacitor, finite source resistance, a load, and named DC and signal test points."
alt = "A signal source v sig at TPIN with source resistance R sig drives the base of NPN transistor Q1 through input coupling capacitor C IN. Divider resistors R1 and R2 bias base test point TPB from V CC. Collector resistor R C connects V CC to collector test point TPC. Emitter test point TPE passes through unbypassed R E1 and bypassed R E2 to TP0; capacitor C E is in parallel with R E2. Output coupling capacitor C OUT connects TPC to output test point TPO and load R L."

[[circuit]]
id = "a03-bias-strategies"
source = "a03-bias-strategies.tex"
chapter_id = "A03"
caption = "Three BJT bias networks expose different feedback paths: fixed base current, collector-to-base feedback, and divider bias with emitter feedback."
alt = "Panel a shows fixed bias: R B connects V CC to the base of an NPN transistor, R C connects V CC to its collector, and the emitter is grounded. Panel b moves R B from V CC to the collector so a collector-voltage decrease opposes base current. Panel c uses divider R1 and R2 at the base and emitter resistor R E so a current increase raises emitter voltage and reduces V BE."

[[circuit]]
id = "a03-common-emitter-midband"
source = "a03-common-emitter-midband.tex"
chapter_id = "A03"
caption = "The complete midband incremental network corresponding to the canonical common-emitter stage: ideal coupling and bypass capacitors become shorts, the ideal supply becomes AC reference, and every source, bias, device, collector, emitter, and load resistance remains visible."
alt = "An incremental source v sig and R sig drive base node b. R B equal to R1 parallel R2 connects b to AC reference. Hybrid-pi resistance r pi connects b to emitter node e, which returns through unbypassed R E1. Collector node c returns through R C and load R L to AC reference. Output resistance r o and a downward controlled current g m v pi connect c to e. Nodes b, c, and e correspond to TPB, TPC, and TPE."

[[circuit]]
id = "a03-incremental-equivalents"
source = "a03-incremental-equivalents.tex"
chapter_id = "A03"
caption = "Low-frequency incremental equivalents about a declared operating point: the BJT hybrid-pi form and the MOSFET transconductance form retain input control, dependent current, and finite output resistance."
alt = "Panel a shows a BJT hybrid-pi equivalent with r pi from base to emitter, a downward controlled current g m v pi from collector to emitter, and output resistance r o in parallel. Panel b shows a MOSFET equivalent with an open low-frequency gate control port, voltage v gs from gate to source, a downward controlled current g m v gs from drain to source, and output resistance r o in parallel."

[[circuit]]
id = "a03-common-source-amplifier"
source = "a03-common-source-amplifier.tex"
chapter_id = "A03"
caption = "A voltage-divider-biased common-source stage. The gate bias network establishes the DC gate voltage; source resistance supplies local feedback; coupling capacitors keep source and load DC conditions separate."
alt = "A signal source v sig at TPIN and resistance R sig drive the gate of n-channel MOSFET M1 through C IN. R G1 and R G2 bias gate test point TPG from V DD. Drain resistor R D connects V DD to drain test point TPD. Source test point TPS passes through R S to TP0. C OUT couples TPD to output TPO and load R L."

[[circuit]]
id = "a03-followers-and-darlington"
source = "a03-followers-and-darlington.tex"
chapter_id = "A03"
caption = "Non-inverting buffer stages: an emitter follower, a source follower, and a Darlington emitter follower. Each trades voltage gain near unity for current drive and impedance transformation; the Darlington consumes additional DC headroom."
alt = "Panel a shows an NPN emitter follower with collector at V CC, input at the base, output at the emitter, and emitter resistor to ground. Panel b shows an n-channel MOSFET source follower with drain at V DD, input at the gate, output at the source, and source resistor to ground. Panel c shows two NPN transistors in a Darlington connection, with Q1 emitter driving Q2 base, joined collectors at V CC, output at Q2 emitter, and an emitter resistor to ground."

[[circuit]]
id = "a03-simple-current-mirrors"
source = "a03-simple-current-mirrors.tex"
chapter_id = "A03"
caption = "Simple two-device low-side current mirrors used as bias elements. The inward-facing reference and output devices make the shared control node explicit; output test point TPO must retain enough voltage for the stated compliance and current-error limits."
alt = "Panel a shows inward-facing matched NPN transistors Q1 and Q2 with separate grounded emitters and a short horizontal common-base connection. An orthogonal strap above Q1 ties its collector to its base without crossing either transistor; R REF feeds that reference node from V CC. Q2 collector rises vertically to output TPO. Panel b uses the same rectangular arrangement for matched nMOS devices with common gates and grounded sources."

[[circuit]]
id = "a03-common-base-gate"
source = "a03-common-base-gate.tex"
chapter_id = "A03"
caption = "Common-base and common-gate stages expose their low-resistance emitter or source input while the control terminal is bypassed to AC reference. Named control-bias ports and idealized high-incremental-resistance current sinks provide the two DC paths required to establish the operating point."
alt = "Panel a shows an NPN common-base stage. A source and finite source resistance drive the emitter through an input capacitor, while a downward ideal bias-current sink supplies a DC emitter path. The collector connects through R C to V CC and supplies output voltage. The base connects to a DC bias port and through C B to ground, making it an AC reference at midband. Panel b shows the analogous nMOS common-gate stage with a source input, downward source-bias current sink, drain resistor R D, gate bias port, and gate bypass capacitor C G."

[[circuit]]
id = "a03-wilson-current-mirror"
source = "a03-wilson-current-mirror.tex"
chapter_id = "A03"
caption = "A classic three-NPN Wilson low-side current mirror. Feedback suppresses first-order base-current transfer error and raises incremental output resistance, while the extra device and internal node consume headroom and add dynamic behavior."
alt = "Three NPN transistors form a Wilson current sink. Matched lower devices Q1 and Q2 have grounded emitters. Their bases share a control node with diode-connected Q2 collector and output-transistor Q3 emitter. Q1 collector joins Q3 base at a separate reference node fed through R REF from V CC. Q3 collector alone rises to output test point TPO, where output current enters and output voltage is positive relative to ground."

[[circuit]]
id = "a03-bjt-cascode"
source = "a03-bjt-cascode.tex"
chapter_id = "A03"
caption = "A BJT cascode stacks a lower common-emitter transconductance device beneath an upper common-base isolation device. One signal-current path crosses both devices; the upper bias holds the intermediate collector voltage comparatively still while the output moves."
alt = "Two NPN transistors are stacked vertically. Lower Q1 receives a combined DC bias and incremental input at its base and returns through emitter resistor R E. Its collector connects directly upward to Q2 emitter at intermediate test point v x, marked as having small signal movement. Q2 base connects to bias V B2 and bypass capacitor C B to AC reference. Q2 collector connects through R C to V CC and horizontally to output v o. Labels identify Q1 as the common-emitter transconductance device and Q2 as the common-base isolation device."

[[circuit]]
id = "a02-transistor-terminal-references"
source = "a02-transistor-terminal-references.tex"
chapter_id = "A02"
caption = "Declared terminal references for an NPN BJT and an n-channel enhancement MOSFET; the explicitly drawn body diode shows the reverse source-to-drain path of a discrete n-channel power MOSFET."
alt = "Two panels show an NPN BJT and an n-channel enhancement MOSFET. BJT base and collector currents enter their terminals and emitter current leaves; V BE and V CE are positive at base and collector relative to emitter. MOSFET gate and drain currents enter and source current leaves; V GS and V DS are positive at gate and drain relative to source. An explicit body diode has anode at source and cathode at drain."

[[circuit]]
id = "a02-bjt-low-side-switch"
source = "a02-bjt-low-side-switch.tex"
chapter_id = "A02"
caption = "A bounded NPN low-side interface includes the driver's output resistance, mandatory base resistor, optional base-emitter discharge resistor, load, supply, and named test points."
alt = "Driver voltage V DRV and output resistance R OUT feed base resistor R B and the base of NPN transistor Q1. Optional resistor R BE connects base to emitter. Load R L connects from supply V CC to the collector. Emitter and driver return share TP0. TPB and TPC expose distinct base and collector voltages; resistor current I RB and collector current I C are marked."

[[circuit]]
id = "a02-controlled-source-load-line"
source = "a02-controlled-source-load-line.tex"
chapter_id = "A02"
caption = "A transistor's large-signal controlled-source representation and an illustrative family of output characteristics. The source/load line, control value, and device relation jointly select each operating point."
alt = "Panel a shows load supply V S and resistor R L feeding a controlled current source I Q of control u, where u can be BJT base current or MOSFET gate-source voltage. The control port is separate from the load-power loop. Panel b plots three illustrative output-current curves for increasing control values and a descending source/load line; their intersections are the operating points."

[[circuit]]
id = "a02-mosfet-low-side-switch"
source = "a02-mosfet-low-side-switch.tex"
chapter_id = "A02"
caption = "An n-channel MOSFET low-side switch with a finite driver, series gate resistor, gate-source pull-down, resistive load, and test points for the gate and drain waveforms."
alt = "Driver voltage V DRV and output resistance R OUT feed gate resistor R G and the gate of n-channel MOSFET Q1. Pull-down R GS connects gate to source. Load R L connects from V DD to the drain. The source and driver share TP0. TPG exposes V GS and TPD exposes V DS."

[[circuit]]
id = "a02-mosfet-dynamic-equivalent"
source = "a02-mosfet-dynamic-equivalent.tex"
chapter_id = "A02"
caption = "A conceptual charge-path equivalent for MOSFET switching. Voltage-dependent C GS, C GD, and C DS organize terminal charge and the Miller interval; they are not constant, independent capacitors over a large transition."
alt = "A time-varying driver with output resistance and gate resistor drives TPG. Voltage-dependent capacitors C GS from gate to source, C GD from gate to drain, and C DS from drain to source connect the three MOSFET terminals. TPD and TP0 name drain and source test points."

[[circuit]]
id = "a02-high-side-complementary-stages"
source = "a02-high-side-complementary-stages.tex"
chapter_id = "A02"
caption = "A P-channel high-side switch and a complementary half-bridge. Gate voltage is always referenced to each device's source; simultaneous half-bridge conduction creates a supply-to-return cross-conduction path."
alt = "Panel a shows a P-channel MOSFET between V DD and load R L, with gate resistor and gate-source pull-up. Panel b shows a P-channel high-side MOSFET and n-channel low-side MOSFET connected at switch node TPSW, which drives a load to ground. Separate high- and low-side drives are shown."

[[circuit]]
id = "a02-mosfet-inductive-load"
source = "a02-mosfet-inductive-load.tex"
chapter_id = "A02"
caption = "The complete current paths for a low-side MOSFET driving a winding represented by R w in series with L. The flyback diode spans the complete winding branch; local bypass capacitance and the shared return remain inside the switching boundary."
alt = "A V DD supply feeds winding resistance R w and inductance L, then drain test point TPD and n-channel MOSFET Q1 to TP0. Flyback diode D F runs from TPD back to the supply across both R w and L. Bypass capacitor C BYP spans the supply and return. A finite driver, gate resistor, pull-down, and TPG are shown. Current arrows identify downward on-state winding current and upward turn-off return current through the diode."

[[circuit]]
id = "a02-bjt-relay-interface"
source = "a02-bjt-relay-interface.tex"
chapter_id = "A02"
caption = "The datasheet-based relay interface used for the final decision: a 5 V GPIO drives a 2N3904 through a bounded base resistor, and a 1N5819 returns the retained winding current I w to the locally bypassed 12 V rail at turn-off."
alt = "A 5 volt GPIO drives the base of 2N3904 Q1 through a 560 ohm resistor; a 100 kilohm base-emitter resistor defines the off state. The collector drives a G2RL 12 volt coil represented by winding resistance R w and inductance L w, with winding current I w marked. A 1N5819 flyback diode spans the complete coil, with anode at collector test point TPC and cathode at the locally bypassed 12 volt rail. TPB and TP0 are also marked."

[[circuit]]
id = "a01-diode-operating-point"
source = "a01-diode-operating-point.tex"
chapter_id = "A01"
caption = "A Thévenin source drives a diode through a series resistance; the source line and diode terminal relation share the operating point."
alt = "A voltage source V S drives resistor R S and diode D1 in series. Diode current I D is referenced clockwise and enters the diode anode. Diode voltage V D is positive at the anode relative to the cathode. Test points TP S, TP1, and TP0 expose the source, diode anode, and zero volt reference."

[[circuit]]
id = "a01-half-wave-rectifier"
source = "a01-half-wave-rectifier.tex"
chapter_id = "A01"
caption = "A half-wave rectifier routes one source polarity through the diode and load while blocking the other in the ideal approximation."
alt = "A time-varying voltage source v s drives diode D1 and load resistor R L in series. Diode current i D points from source to load. Output voltage v o is positive at TP2 relative to zero volt test point TP0; TP1 observes the source."

[[circuit]]
id = "a01-bridge-rectifier"
source = "a01-bridge-rectifier.tex"
chapter_id = "A01"
caption = "A four-diode bridge routes either input polarity through the load from the positive output node to the negative output node."
alt = "Four diodes form a diamond between alternating input terminals TPA and TPB and output terminals TP plus and TP minus. Load resistor R L connects from TP plus to TP minus, and load current points downward. When TPA is positive, D1 and D4 conduct; when TPB is positive, D2 and D3 conduct."

[[circuit]]
id = "a01-rail-clamp"
source = "a01-rail-clamp.tex"
chapter_id = "A01"
caption = "A series resistor limits fault current while two diodes divert excursions beyond the supply rails; the receiving circuit and rail sink capability remain part of the protection boundary."
alt = "Input voltage V IN drives protected node TP1 through series resistor R S. Upper diode D H has its anode at TP1 and cathode at V DD, with I H directed from TP1 to V DD. Lower diode D L has its anode at zero volts and cathode at TP1, with I L directed from TP0 toward TP1."

[[circuit]]
id = "a01-optojunctions"
source = "a01-optojunctions.tex"
chapter_id = "A01"
caption = "Basic electrical interfaces for optical junctions: a resistor limits LED forward current, while a reverse-biased photodiode converts light-generated current into an output-voltage change across a load resistor."
alt = "Panel a shows source V S, current-limiting resistor R LED, and LED D LED in series, with forward current I F. Panel b shows bias source V B feeding resistor R L and output TP1; photodiode D PD is reverse biased from the output node to ground, and light-generated current I ph points from the output toward ground."

[[circuit]]
id = "a01-diode-family-symbols"
source = "a01-diode-family-symbols.tex"
chapter_id = "A01"
caption = "Common diode-family schematic symbols. The generic diode symbol is shared by several structures and application classes, so the reference designator and part specification remain essential."
alt = "Two rows of common diode symbols. The upper row shows an ordinary p-n diode, a Zener or avalanche diode, a Schottky diode, and a varactor. The lower row shows a tunnel diode, an LED, and a photodiode. Anode A and cathode K are marked on the ordinary diode."

[[circuit]]
id = "a01-zener-reference"
source = "a01-zener-reference.tex"
chapter_id = "A01"
caption = "A shunt breakdown reference requires a source resistor and a feasible current window: resistor current divides between the reverse-operated Zener diode and the load."
alt = "Voltage source V S drives series resistor R S to output test point TP1. Reverse-operated Zener diode D Z connects from TP1 to ground, with its cathode at TP1. Load resistor R L is in parallel with the Zener. Resistor current I R divides into downward Zener current I Z and load current I L."

[[circuit]]
id = "f01-shock-path"
source = "f01-shock-path.tex"
chapter_id = "F01"
caption = "The shock path as a circuit: a source drives current through the body, modelled as a resistance to earth."
alt = "Voltage source VS connects earth to an exposed live contact. The body, drawn as resistor R_body, returns from the contact to earth, and the shock current I flows from the contact through R_body to earth."

[[circuit]]
id = "f01-capacitor-bleed"
source = "f01-capacitor-bleed.tex"
chapter_id = "F01"
caption = "Stored energy outlives the switch: capacitor C holds its voltage after switch S opens, discharging only through the bleed resistor."
alt = "Source VS charges capacitor C through switch S. A bleed resistor R_bleed is connected permanently across C, and test point TP1 marks the capacitor voltage v_C. When S opens, C discharges through R_bleed."

[[circuit]]
id = "f01-divider-loading"
source = "f01-divider-loading.tex"
chapter_id = "F01"
caption = "A voltmeter loads the node it measures: its finite input resistance R_in sits in parallel with R2, pulling the reading at TP1 below the unloaded divider value."
alt = "Voltage source VS drives series resistors R1 and R2 to ground, with output test point TP1 at their junction. A voltmeter of input resistance R_in is connected from TP1 to the 0 V rail, in parallel with R2."

[[circuit]]
id = "f06-divider-measurement"
source = "f06-divider-measurement.tex"
chapter_id = "F06"
caption = "The F06 divider and measurement connection: a 5 V source drives 100 kΩ and 400 kΩ resistors, while the finite meter input resistance joins TP1 to reference TP0."
alt = "A 5 V source at TP_S drives 100 kilohm resistor R1 to TP1 and 400 kilohm resistor R2 from TP1 to reference TP0. Meter input resistance R_in connects between TP1 and TP0. Voltage V0 is positive at TP1 relative to TP0."

[[circuit]]
id = "f06-ammeter-insertion"
source = "f06-ammeter-insertion.tex"
chapter_id = "F06"
caption = "An ammeter is inserted in series: current enters RED and leaves COM, while effective burden resistance R_A reduces the current that existed before insertion."
alt = "A Thevenin source V_th and resistance R_th drive a series loop through an ammeter, its effective burden resistance R_A, and load R_L. Indicated current I_read enters the RED terminal and leaves COM. Burden voltage V_B is positive from RED to COM."

[[circuit]]
id = "f02-reference-directions"
source = "f02-reference-directions.tex"
chapter_id = "F02"
caption = "Reference directions come before signs: a single loop with the current reference arrow I (clockwise) and the voltage polarity V_R (+ at the top of R) declared in advance, so a negative reading means reality opposes the chosen sense, not that a mistake was made."
alt = "A voltage source VS with its plus terminal at the top rail drives a clockwise current I through a single load resistor R and back along the return rail to the 0 V reference node. The voltage across R, V_R, is marked positive at the top where the current enters, and test points TP_A and TP_B are brought out to clear space."

[[circuit]]
id = "f02-node-currents"
source = "f02-node-currents.tex"
chapter_id = "F02"
caption = "Charge continuity at a junction: the signed current imbalance I1 - I2 - I3 equals the rate of charge accumulation in the enclosed node region; the ideal-node approximation sets that rate to zero and gives I1 = I2 + I3."
alt = "Three resistor branches meet at a single connection dot labelled node a. Current I1 points into the node while I2 and I3 point out. Their signed imbalance equals the rate of charge accumulation and becomes zero for an ideal lumped node."

[[circuit]]
id = "f02-shared-return"
source = "f02-shared-return.tex"
chapter_id = "F02"
caption = "Why two grounds can differ: the shared return conductor has resistance R_ret and carries the load current I, so the load-side ground G1 sits above the reference ground G0 by I times R_ret, and the single-node idealization of the return fails."
alt = "A source VS drives current I through load R_L, which returns through a resistor R_ret representing the shared return conductor back to the reference ground G0. The load-side return node G1 is brought out to a labelled test point; the voltage from G1 to G0 equals I times R_ret rather than zero."

[[circuit]]
id = "f03-voltage-divider"
source = "f03-voltage-divider.tex"
chapter_id = "F03"
caption = "A loaded voltage divider: R1 feeds TP1 from TP_S, while R2 and the external load RL form parallel return paths to TP0."
alt = "Voltage source VS drives source test point TP_S and R1 to output test point TP1. R2 and load resistor RL connect in parallel from TP1 to the zero-volt return at TP0."

[[circuit]]
id = "f03-source-load"
source = "f03-source-load.tex"
chapter_id = "F03"
caption = "A finite-resistance voltage source drives a resistive load at a shared terminal voltage and current operating point."
alt = "Ideal source V_OC in series with source resistance R_S drives load R_L. Current I leaves the source and enters the load at terminal A; voltage V is measured from A to terminal B at zero volts."

[[circuit]]
id = "f04-bridge"
source = "f04-bridge.tex"
chapter_id = "F04"
caption = "A resistive bridge with two unknown node voltages and a declared bridge-current reference."
alt = "A 10 volt source feeds two resistor dividers. R1 and R2 meet at test point TP1 with node voltage v1; R3 and R4 meet at TP2 with node voltage v2; bridge resistor R5 connects TP1 to TP2, with current I12 referenced from v1 to v2. TP0 is the zero volt reference."

[[circuit]]
id = "f04-two-mesh"
source = "f04-two-mesh.tex"
chapter_id = "F04"
caption = "Two planar meshes share one resistor; clockwise mesh-current references make the shared downward branch current I1 minus I2."
alt = "Two adjacent loops share resistor R2. The left loop contains a 10 volt source and R1; the right loop contains R3 and a 5 volt source. Both mesh currents are clockwise, so they oppose in shared resistor R2."

[[circuit]]
id = "f04-one-port"
source = "f04-one-port.tex"
chapter_id = "F04"
caption = "A linear source network drives a removable load at port A-B; the same named port is used for superposition, equivalent reduction, and verification."
alt = "A 10 volt source feeds port A through R1, R2 connects A to the zero volt terminal B, and a 1 milliamp current source injects current from B into A. Load RL connects from A to B, with load current i leaving the network at A."

[[circuit]]
id = "f07-rc-transient"
source = "f07-rc-transient.tex"
chapter_id = "F07"
caption = "The same first-order RC network in its charging and source-free discharge configurations, with one capacitor-voltage polarity and current reference retained across switching."
alt = "Two RC circuits are shown. In the charging circuit a source, switch, and Thevenin resistance feed capacitor C to ground. In the discharge circuit the source is removed and the same resistance is connected across C. Capacitor voltage v_C is positive at TP1 relative to TP0, and current i_C is referenced into that positive terminal."

[[circuit]]
id = "f07-rl-transient"
source = "f07-rl-transient.tex"
chapter_id = "F07"
caption = "The same first-order RL network in its energized and source-free configurations, with the inductor-current reference retained across switching."
alt = "Two RL circuits are shown. In the energizing circuit a source and switch drive a Thevenin resistance and inductor L in series. In the natural-response circuit the source is removed and R and L form a closed loop. Inductor current i_L retains the same reference direction through the switch event."

[[circuit]]
id = "f07-flyback-clamp"
source = "f07-flyback-clamp.tex"
chapter_id = "F07"
caption = "A flyback diode gives an inductive load current a controlled path when the low-side switch opens."
alt = "A 12 volt source feeds winding resistance R_w and inductor L, then a low-side switch to ground. Diode D_F spans the complete series winding representation R_w plus L and is reverse-biased while the switch is closed. When the switch opens, the retained downward winding current returns upward through D_F. TP1 observes the switch node relative to TP0."

[[circuit]]
id = "f07-thevenin-transient"
source = "f07-thevenin-transient.tex"
chapter_id = "F07"
caption = "A switched divider drives a capacitor, requiring separate pre-switch state, post-switch final-value, and post-switch resistance calculations."
alt = "A 9 volt source and closing switch feed 2 kilohm resistor R1 into TP1. Resistor R2 of 4 kilohms and capacitor C of 15 microfarads both connect from TP1 to reference TP0. Capacitor current i_C is referenced downward into its positive TP1 terminal."

[[circuit]]
id = "f07-leaky-rc"
source = "f07-leaky-rc.tex"
chapter_id = "F07"
caption = "A leakage resistance in parallel with the capacitor changes both the final voltage and the time constant."
alt = "A 5 volt source drives TP1 through a 10 kilohm resistor. A 10 microfarad capacitor and leakage resistance R_leak connect in parallel from TP1 to TP0, the zero volt reference."

[[circuit]]
id = "f08-rc-frequency"
source = "f08-rc-frequency.tex"
chapter_id = "F08"
caption = "An RC low-pass first as the ideal analysis circuit, then with source resistance, load resistance, and probe resistance and capacitance made explicit."
alt = "Panel a shows a sinusoidal source driving resistor R and capacitor C, with output TP2 measured across C relative to TP0. Panel b adds source resistance R_S, load resistance R_L, and the probe input represented by parallel resistance R_p and capacitance C_p. TP1 is the source-side test point and TP2 is the loaded output node."

[[circuit]]
id = "f08-series-rlc"
source = "f08-series-rlc.tex"
chapter_id = "F08"
caption = "A series RLC circuit separates measured resistance from an equivalent resistance representing all other approximately constant series loss over the resonance band."
alt = "A sinusoidal source drives measured resistor R_M, equivalent loss resistor R_loss, inductor L, and capacitor C in one loop. Current i is referenced clockwise. TP1 and TP2 span only R_M so v_M is positive where current enters; TP0 is the zero-volt return."

[[circuit]]
id = "f08-rl-frequency"
source = "f08-rl-frequency.tex"
chapter_id = "F08"
caption = "A series RL circuit exposes both resistor and inductor output polarities, showing complementary first-order low-pass and high-pass responses."
alt = "A sinusoidal source drives resistor R and inductor L in series. Current i is referenced clockwise. TP1 and TP2 span resistor R with v_R positive where current enters; v_L is positive at TP2 relative to the return TP0."

[[circuit]]
id = "a04-inverting-noninverting"
source = "a04-inverting-noninverting.tex"
chapter_id = "A04"
caption = "Canonical inverting and non-inverting voltage-feedback stages with finite loads and explicit bipolar supply connections."
alt = "Panel a shows an input source and R in driving the inverting input, the non-inverting input grounded, and R F returning the loaded output to the inverting summing node. Panel b drives the non-inverting input directly; R F and R G form the output-to-ground divider that returns a fraction of the output to the inverting input. Both op amps show positive and negative supply connections and output test points."

[[circuit]]
id = "a04-summing-difference"
source = "a04-summing-difference.tex"
chapter_id = "A04"
caption = "Two linear op-amp combinations: an inverting weighted summer and a four-resistor difference amplifier whose resistor ratios must match."
alt = "Panel a routes v1 through R1 and v2 through R2 into one inverting summing junction, with R F providing feedback and the non-inverting input grounded. Panel b routes v1 through R1 to the inverting input and v2 through R3 to the non-inverting input; R2 is the feedback resistor and R4 returns the non-inverting input to ground. The displayed condition is R2 over R1 equals R4 over R3."

[[circuit]]
id = "a04-filter-integrator"
source = "a04-filter-integrator.tex"
chapter_id = "A04"
caption = "First-order active functions: an inverting low-pass and a practical inverting integrator, each using capacitive feedback with a parallel resistor that bounds the DC gain."
alt = "Panel a shows an inverting stage with R in at the summing node and C F in parallel with R F from output to the summing node, producing a finite-DC-gain first-order low-pass. Panel b uses the same capacitive feedback form but names the parallel DC feedback resistor R P; C F dominates integration over the intended frequency range."

[[circuit]]
id = "a04-comparator-hysteresis"
source = "a04-comparator-hysteresis.tex"
chapter_id = "A04"
caption = "Open-loop comparison and inverting Schmitt hysteresis shown with explicit output levels, reference input, positive feedback, supplies, and load."
alt = "Panel a compares v in at the non-inverting input with V REF at the inverting input and drives the output to V OH or V OL without feedback. Panel b drives the inverting input directly with v in. R B connects V REF to the non-inverting threshold node and R H returns positive feedback from the output to that same node, producing distinct lower and upper switching thresholds."

[[circuit]]
id = "a04-single-supply-design"
source = "a04-single-supply-design.tex"
chapter_id = "A04"
caption = "A complete DC-coupled, single-supply non-inverting stage referenced to an external low-impedance voltage, with finite source resistance, feedback return, local supply decoupling, load, and named test points."
alt = "A grounded input source v i drives the non-inverting input through finite resistance R sig, which also supplies that input's DC bias-current return. R G connects the inverting input to the externally generated low-impedance V REF port, and R F connects output TPO to the inverting input. Load R L connects TPO directly to TP0. The op amp is powered from V DD and TP0, and C DEC bypasses V DD to TP0. Test points identify the input, both op-amp inputs, the reference, output, and zero-volt return."

[[circuit]]
id = "a04-terminal-references"
source = "a04-terminal-references.tex"
chapter_id = "A04"
caption = "Op-amp terminal quantities with explicit input-current directions, differential-input and output-voltage polarities, both supply rails, a finite load, and a circuit reference that is distinct from the negative supply."
alt = "One voltage-feedback op-amp has test points v plus and v minus at its inputs, with i plus and i minus arrows directed into the respective pins. A bracket defines v d as v plus minus v minus. The upper and lower supply pins connect separately to V S plus and V S minus. Output current i o leaves the output test point, load R L returns to TP0, and a second bracket defines v o as the voltage at TPO relative to TP0. Labels emphasize that TP0 is the zero-volt circuit reference and is not the lower supply rail."

[[circuit]]
id = "a04-internal-stages"
source = "a04-internal-stages.tex"
chapter_id = "A04"
caption = "An illustrative BJT voltage-feedback op-amp architecture—not a transistor-level schematic of the TLV9061—showing differential conversion, active loading, voltage gain, compensation, and buffered output drive."
alt = "Matched NPN transistors Q1 and Q2 form a differential input pair with v minus applied to Q1, v plus applied to Q2, and a common tail-current sink to minus V S. PNP transistors Q3 and Q4 form a current-mirror active load connected to plus V S and convert the differential current to single-ended high-resistance node v x. A powered inverting voltage-gain and level-shift block has compensation capacitor C C connected around it. A separately powered class-AB buffer drives output v o and load R L to TP0. A sign cue states that increasing v plus relative to v minus increases Q2 collector current, decreases Q1 and mirrored Q4 current, lowers v x, and ultimately raises v o."

[[circuit]]
id = "a04-transimpedance"
source = "a04-transimpedance.tex"
chapter_id = "A04"
caption = "A transimpedance stage with the signal-current reference declared positive into the inverting summing node, a general feedback impedance, and source shunt capacitance made explicit."
alt = "Current source i s drives test point TP minus at the op amp inverting input, with a rightward arrow declaring positive current into the summing node. Feedback impedance Z F of s connects output v o back to TP minus. The non-inverting input is held at low-impedance reference V REF. Source shunt capacitance C S connects from TP minus to TP0. The displayed sign relation is v o approximately V REF minus i s times Z F."

[[circuit]]
id = "a04-capacitive-load"
source = "a04-capacitive-load.tex"
chapter_id = "A04"
caption = "Two capacitive-load connections distinguish feedback sensing before and after an optional output-isolation resistor; moving the sensed node changes the loop."
alt = "Panel a shows a voltage follower whose feedback senses op amp output v o before isolation resistor R iso, while load capacitor C L is connected at load voltage v L after the resistor. Panel b moves feedback sensing to v L after R iso, placing both resistor and capacitor inside the loop. A warning states that the sensing point changes loop gain and that R iso must be checked for the chosen op amp and load."

[[circuit]]
id = "a04-static-input-errors"
source = "a04-static-input-errors.tex"
chapter_id = "A04"
caption = "An illustrative, sign-declared DC input-error equivalent for an inverting stage, including source and reference Thevenin resistances, input offset voltage, both input bias currents, and first-order bias-current compensation."
alt = "A signal Thevenin source V TH and resistance R TH drive the op amp inverting input through R IN, with R F returning output v o to the summing node. Bias current I B minus points into the inverting pin. A reference Thevenin source V REF TH and resistance R REF TH drive the non-inverting path through compensation resistor R B and a series offset source V OS whose op-amp-side terminal is positive. Bias current I B plus points into the non-inverting pin. The output drives load R L to TP0. Notes declare the offset-source polarity and the approximate resistance match used to reduce bias-current error."

[[circuit]]
id = "a05-wheatstone-bridge"
source = "a05-wheatstone-bridge.tex"
chapter_id = "A05"
caption = "A voltage-excited Wheatstone bridge with four resistive arms, a complete excitation-return loop, and an explicitly signed differential output."
alt = "Excitation voltage V EX is applied between the top rail and the zero-volt return of two parallel divider legs. R1 and R2 form the left leg, whose midpoint is TP plus at v plus; R3 and R4 form the right leg, whose midpoint is TP minus at v minus. A polarity bracket defines bridge output v d as v plus minus v minus."

[[circuit]]
id = "a05-bridge-instrumentation"
source = "a05-bridge-instrumentation.tex"
chapter_id = "A05"
caption = "A locally excited remote bridge sends a balanced differential signal pair through matched filtering to a triangular instrumentation-amplifier symbol. A dashed package boundary exposes the INA-specific gain-setting and low-impedance reference pins."
alt = "A local V EX source drives a remote four-resistor bridge through separate excitation and return conductors. The bridge sends its two midpoint voltages over a balanced differential signal pair. Equal resistors R F plus and R F minus feed the positive and negative inputs of triangular instrumentation amplifier A1. Differential capacitor C D spans the filtered input pair, while equal capacitors C CM plus and C CM minus return each input to TP0. A dashed package boundary surrounds the triangle. External resistor R G connects its two gain pins. Explicit positive and negative supplies power A1; a low-impedance V REF source drives its REF pin. Output TPO drives load R L to TP0."

[[circuit]]
id = "a05-rtd-four-wire"
source = "a05-rtd-four-wire.tex"
chapter_id = "A05"
caption = "A four-wire RTD separates the excitation-current conductors from the high-impedance differential sense pair, suppressing first-order force-lead voltage drop without claiming that sense current or leakage is exactly zero."
alt = "An ideal excitation current source drives remote RTD resistance R RTD through force-lead resistances R LF plus and R LF minus. Separate sense leads with resistances R LS plus and R LS minus connect directly at the two RTD terminals to the positive and negative inputs of a high-input-impedance differential amplifier. The output is v RTD. Sense currents are marked approximately zero."

[[circuit]]
id = "a05-thermocouple-interface"
source = "a05-thermocouple-interface.tex"
chapter_id = "A05"
caption = "A thermocouple interface needs two observations: a high-impedance differential measurement of thermocouple EMF and a temperature measurement at the isothermal cold-junction connection region."
alt = "A thermocouple EMF source depending on hot-junction temperature T H and cold-junction temperature T CJ drives a differential amplifier through thermocouple resistance. A separate cold-junction sensor measures T CJ. The amplified EMF and T CJ enter a reference-function correction block that reports T H."

[[circuit]]
id = "a05-piezo-charge-amplifier"
source = "a05-piezo-charge-amplifier.tex"
chapter_id = "A05"
caption = "A piezoelectric terminal equivalent drives a charge amplifier. Generated charge-rate current shares the input node with sensor capacitance and leakage; feedback capacitance sets charge gain while feedback resistance supplies the finite DC return. Op-amp supply and decoupling connections are intentionally omitted from this topology view."
alt = "A generated current source i q equal to d q s over d t is in parallel with piezoelectric sensor capacitance C P and leakage resistance R P. The shared node drives the inverting input of op amp A1, whose non-inverting input is grounded. Feedback capacitor C F and resistor R F connect from output to the inverting input. Output TPO is v o."
