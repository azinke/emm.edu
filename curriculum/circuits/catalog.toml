version = 1

[[circuit]]
id = "f01-shock-path"
source = "f01-shock-path.tex"
chapter_id = "F01"
caption = "The shock path as a circuit: a source drives current through the body, modelled as a resistance to earth."
alt = "Voltage source VS connects earth to an exposed live contact. The body, drawn as resistor R_body, returns from the contact to earth, and the shock current I flows from the contact through R_body to earth."

[[circuit]]
id = "f01-capacitor-bleed"
source = "f01-capacitor-bleed.tex"
chapter_id = "F01"
caption = "Stored energy outlives the switch: capacitor C holds its voltage after switch S opens, discharging only through the bleed resistor."
alt = "Source VS charges capacitor C through switch S. A bleed resistor R_bleed is connected permanently across C, and test point TP1 marks the capacitor voltage v_C. When S opens, C discharges through R_bleed."

[[circuit]]
id = "f01-divider-loading"
source = "f01-divider-loading.tex"
chapter_id = "F01"
caption = "A voltmeter loads the node it measures: its finite input resistance R_in sits in parallel with R2, pulling the reading at TP1 below the unloaded divider value."
alt = "Voltage source VS drives series resistors R1 and R2 to ground, with output test point TP1 at their junction. A voltmeter of input resistance R_in is connected from TP1 to the 0 V rail, in parallel with R2."

[[circuit]]
id = "f06-divider-measurement"
source = "f06-divider-measurement.tex"
chapter_id = "F06"
caption = "The F06 divider and measurement connection: a 5 V source drives 100 kΩ and 400 kΩ resistors, while the finite meter input resistance joins TP1 to reference TP0."
alt = "A 5 V source at TP_S drives 100 kilohm resistor R1 to TP1 and 400 kilohm resistor R2 from TP1 to reference TP0. Meter input resistance R_in connects between TP1 and TP0. Voltage V0 is positive at TP1 relative to TP0."

[[circuit]]
id = "f06-ammeter-insertion"
source = "f06-ammeter-insertion.tex"
chapter_id = "F06"
caption = "An ammeter is inserted in series: current enters RED and leaves COM, while effective burden resistance R_A reduces the current that existed before insertion."
alt = "A Thevenin source V_th and resistance R_th drive a series loop through an ammeter, its effective burden resistance R_A, and load R_L. Indicated current I_read enters the RED terminal and leaves COM. Burden voltage V_B is positive from RED to COM."

[[circuit]]
id = "f02-reference-directions"
source = "f02-reference-directions.tex"
chapter_id = "F02"
caption = "Reference directions come before signs: a single loop with the current reference arrow I (clockwise) and the voltage polarity V_R (+ at the top of R) declared in advance, so a negative reading means reality opposes the chosen sense, not that a mistake was made."
alt = "A voltage source VS with its plus terminal at the top rail drives a clockwise current I through a single load resistor R and back along the return rail to the 0 V reference node. The voltage across R, V_R, is marked positive at the top where the current enters, and test points TP_A and TP_B are brought out to clear space."

[[circuit]]
id = "f02-node-currents"
source = "f02-node-currents.tex"
chapter_id = "F02"
caption = "Charge continuity at a junction: the signed current imbalance I1 - I2 - I3 equals the rate of charge accumulation in the enclosed node region; the ideal-node approximation sets that rate to zero and gives I1 = I2 + I3."
alt = "Three resistor branches meet at a single connection dot labelled node a. Current I1 points into the node while I2 and I3 point out. Their signed imbalance equals the rate of charge accumulation and becomes zero for an ideal lumped node."

[[circuit]]
id = "f02-shared-return"
source = "f02-shared-return.tex"
chapter_id = "F02"
caption = "Why two grounds can differ: the shared return conductor has resistance R_ret and carries the load current I, so the load-side ground G1 sits above the reference ground G0 by I times R_ret, and the single-node idealization of the return fails."
alt = "A source VS drives current I through load R_L, which returns through a resistor R_ret representing the shared return conductor back to the reference ground G0. The load-side return node G1 is brought out to a labelled test point; the voltage from G1 to G0 equals I times R_ret rather than zero."

[[circuit]]
id = "f03-voltage-divider"
source = "f03-voltage-divider.tex"
chapter_id = "F03"
caption = "A loaded voltage divider: R1 feeds TP1 from TP_S, while R2 and the external load RL form parallel return paths to TP0."
alt = "Voltage source VS drives source test point TP_S and R1 to output test point TP1. R2 and load resistor RL connect in parallel from TP1 to the zero-volt return at TP0."

[[circuit]]
id = "f03-source-load"
source = "f03-source-load.tex"
chapter_id = "F03"
caption = "A finite-resistance voltage source drives a resistive load at a shared terminal voltage and current operating point."
alt = "Ideal source V_OC in series with source resistance R_S drives load R_L. Current I leaves the source and enters the load at terminal A; voltage V is measured from A to terminal B at zero volts."

[[circuit]]
id = "f04-bridge"
source = "f04-bridge.tex"
chapter_id = "F04"
caption = "A resistive bridge with two unknown node voltages and a declared bridge-current reference."
alt = "A 10 volt source feeds two resistor dividers. R1 and R2 meet at test point TP1 with node voltage v1; R3 and R4 meet at TP2 with node voltage v2; bridge resistor R5 connects TP1 to TP2, with current I12 referenced from v1 to v2. TP0 is the zero volt reference."

[[circuit]]
id = "f04-two-mesh"
source = "f04-two-mesh.tex"
chapter_id = "F04"
caption = "Two planar meshes share one resistor; clockwise mesh-current references make the shared downward branch current I1 minus I2."
alt = "Two adjacent loops share resistor R2. The left loop contains a 10 volt source and R1; the right loop contains R3 and a 5 volt source. Both mesh currents are clockwise, so they oppose in shared resistor R2."

[[circuit]]
id = "f04-one-port"
source = "f04-one-port.tex"
chapter_id = "F04"
caption = "A linear source network drives a removable load at port A-B; the same named port is used for superposition, equivalent reduction, and verification."
alt = "A 10 volt source feeds port A through R1, R2 connects A to the zero volt terminal B, and a 1 milliamp current source injects current from B into A. Load RL connects from A to B, with load current i leaving the network at A."

[[circuit]]
id = "f07-rc-transient"
source = "f07-rc-transient.tex"
chapter_id = "F07"
caption = "The same first-order RC network in its charging and source-free discharge configurations, with one capacitor-voltage polarity and current reference retained across switching."
alt = "Two RC circuits are shown. In the charging circuit a source, switch, and Thevenin resistance feed capacitor C to ground. In the discharge circuit the source is removed and the same resistance is connected across C. Capacitor voltage v_C is positive at TP1 relative to TP0, and current i_C is referenced into that positive terminal."

[[circuit]]
id = "f07-rl-transient"
source = "f07-rl-transient.tex"
chapter_id = "F07"
caption = "The same first-order RL network in its energized and source-free configurations, with the inductor-current reference retained across switching."
alt = "Two RL circuits are shown. In the energizing circuit a source and switch drive a Thevenin resistance and inductor L in series. In the natural-response circuit the source is removed and R and L form a closed loop. Inductor current i_L retains the same reference direction through the switch event."

[[circuit]]
id = "f07-flyback-clamp"
source = "f07-flyback-clamp.tex"
chapter_id = "F07"
caption = "A flyback diode gives an inductive load current a controlled path when the low-side switch opens."
alt = "A 12 volt source feeds winding resistance R_w and inductor L, then a low-side switch to ground. Diode D_F spans the complete series winding representation R_w plus L and is reverse-biased while the switch is closed. When the switch opens, the retained downward winding current returns upward through D_F. TP1 observes the switch node relative to TP0."

[[circuit]]
id = "f07-thevenin-transient"
source = "f07-thevenin-transient.tex"
chapter_id = "F07"
caption = "A switched divider drives a capacitor, requiring separate pre-switch state, post-switch final-value, and post-switch resistance calculations."
alt = "A 9 volt source and closing switch feed 2 kilohm resistor R1 into TP1. Resistor R2 of 4 kilohms and capacitor C of 15 microfarads both connect from TP1 to reference TP0. Capacitor current i_C is referenced downward into its positive TP1 terminal."

[[circuit]]
id = "f07-leaky-rc"
source = "f07-leaky-rc.tex"
chapter_id = "F07"
caption = "A leakage resistance in parallel with the capacitor changes both the final voltage and the time constant."
alt = "A 5 volt source drives TP1 through a 10 kilohm resistor. A 10 microfarad capacitor and leakage resistance R_leak connect in parallel from TP1 to TP0, the zero volt reference."

[[circuit]]
id = "f08-rc-frequency"
source = "f08-rc-frequency.tex"
chapter_id = "F08"
caption = "An RC low-pass first as the ideal analysis circuit, then with source resistance, load resistance, and probe resistance and capacitance made explicit."
alt = "Panel a shows a sinusoidal source driving resistor R and capacitor C, with output TP2 measured across C relative to TP0. Panel b adds source resistance R_S, load resistance R_L, and the probe input represented by parallel resistance R_p and capacitance C_p. TP1 is the source-side test point and TP2 is the loaded output node."

[[circuit]]
id = "f08-series-rlc"
source = "f08-series-rlc.tex"
chapter_id = "F08"
caption = "A series RLC circuit separates measured resistance from an equivalent resistance representing all other approximately constant series loss over the resonance band."
alt = "A sinusoidal source drives measured resistor R_M, equivalent loss resistor R_loss, inductor L, and capacitor C in one loop. Current i is referenced clockwise. TP1 and TP2 span only R_M so v_M is positive where current enters; TP0 is the zero-volt return."

[[circuit]]
id = "f08-rl-frequency"
source = "f08-rl-frequency.tex"
chapter_id = "F08"
caption = "A series RL circuit exposes both resistor and inductor output polarities, showing complementary first-order low-pass and high-pass responses."
alt = "A sinusoidal source drives resistor R and inductor L in series. Current i is referenced clockwise. TP1 and TP2 span resistor R with v_R positive where current enters; v_L is positive at TP2 relative to the return TP0."
