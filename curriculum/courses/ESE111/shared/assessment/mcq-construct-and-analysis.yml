bank_id: ESE111-CH04-MCQ
version: 0.1.0
status: construct-ready-items-pending-restricted-store-and-independent-review
language_routes: [en, fr]
item_count_target_pilot: 10
item_count_target_mature: 20
shared_contract:
  options_per_item: 4
  parity: identical stimulus, values, cognitive demand, allowed resources, time target, and misconception construct
  accessibility: no idiom, double negative, color-only distinction, or uncaptioned evidence; reading demand is construct-relevant
  explanation: each option receives misconception-sensitive feedback in both languages
blueprint:
  - {slot: 1, level: beginner, cognitive: understand, outcome: ESE111-CO01, misconception: voltage-needs-reference, evidence: text}
  - {slot: 2, level: beginner, cognitive: apply, outcome: ESE111-CO01, misconception: kcl-current-consumed, evidence: schematic}
  - {slot: 3, level: beginner, cognitive: apply, outcome: PLO-01, misconception: negative-current-invalid, evidence: signed-arrow}
  - {slot: 4, level: intermediate, cognitive: apply, outcome: PLO-01, misconception: kvl-voltages-equal, evidence: loop-values}
  - {slot: 5, level: intermediate, cognitive: analyze, outcome: PLO-07, misconception: resolution-equals-accuracy, evidence: short-specification-table}
  - {slot: 6, level: intermediate, cognitive: analyze, outcome: PLO-07, misconception: meter-is-invisible, evidence: before-after-readings}
  - {slot: 7, level: intermediate, cognitive: analyze, outcome: PLO-08, misconception: debug-by-replacement, evidence: fault-symptoms}
  - {slot: 8, level: advanced, cognitive: analyze, outcome: PLO-08, misconception: zero-current-zero-voltage, evidence: schematic-and-node-table}
  - {slot: 9, level: advanced, cognitive: evaluate, outcome: PLO-07, misconception: any-residual-is-failure, evidence: uncertainty-and-residual-table}
  - {slot: 10, level: advanced, cognitive: evaluate, outcome: PLO-02, misconception: nominal-design-is-verified, evidence: candidate-trade-study}
restricted_reference: RST-ESE111-CH04-MCQ-001
independent_review_required:
  reviewers: [technical-reviewer-not-author, fluent-en-pedagogical-reviewer, fluent-fr-pedagogical-reviewer, assessment-reviewer]
  checks: [single defensible key, plausible distractors, source/units, safety, cognitive level, parity, explanation value, accessibility]
post_pilot_plan:
  metrics_by_language: [attempt_count, omission_count, median_time_s, difficulty_fraction_correct, discrimination_when_sample_allows, distractor_selection]
  small_sample_rule: report exact counts and ranges; do not claim statistical equivalence or differential item functioning from an underpowered pilot
  wording_vs_concept: compare think-aloud evidence, option reasoning, cross-language back-translation, and performance on other items sharing the construct
  disposition: retain, revise-both, replace, or retire with reason and reviewer
  growth_rule: add an item only for an uncovered outcome-by-level-by-misconception-by-evidence cell or to replace a defective item; never add quota filler
  mature_gate: at least 20 independently reviewed items after learner use and item disposition, with at least 20 percent evidence-rich stimuli

