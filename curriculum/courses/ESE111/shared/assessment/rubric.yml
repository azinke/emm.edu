rubric_id: ESE111-CH04-RUBRIC-01
version: 0.1.0
mastery_level: 3
total_points: 28
rows:
  - {id: requirements, points: 4, evidence: threshold and current-budget trace, mastery: measurable requirements and acceptance conditions both explicit}
  - {id: model, points: 4, evidence: signed KCL/KVL/resistor equations, mastery: correct equations, units, solved values, domain, and independent check}
  - {id: implementation, points: 4, evidence: inspected reproducible network, mastery: topology and reference designators agree with the controlled schematic}
  - {id: measurement, points: 4, evidence: raw table and uncertainty, mastery: safe configuration, recoverable raw values, loading considered, anomalies retained}
  - {id: debugging, points: 4, evidence: hypothesis-test-update log, mastery: discriminating test supports root cause and corrected rerun}
  - {id: communication, points: 4, evidence: concise EN or FR defense, mastery: claims fit evidence, configuration and limitations are reproducible}
  - {id: responsibility, points: 4, evidence: safety and integrity record, mastery: energy bounds, stop rules, honest provenance, and component recovery followed}
decision_rule:
  pass: at least 20 of 28 points, Level 3 in model, measurement, and debugging, and no conjunctive failure
  conjunctive_failures: [unsafe energization or adjustment, current-jack misuse, fabricated or deleted raw data, untraceable seeded-fault handling]
  reassessment: use changed parameters and a different reversible fault after targeted remediation
language_equity: same figures, parameters, points, resources, prompts, and mastery decision in EN and FR

