classification_policy:
  derivation: concept-stable claims must show equations, assumptions, units, and an executable independent oracle
  component_behavior: platform-bound behavior requires the exact datasheet/manual revision and operating conditions
  instrument_limit: platform-bound limits require function identification, mode/range, input model, accuracy, and review on substitution
  historical_context: contextual statements require a citable source and are omitted when they do not change understanding
  version_bound: standards, safety rules, software, and named products require version, retrieval date, owner, and review trigger
claims:
  - claim_id: ESE111-CH04-CLM-001
    wording:
      en: In the declared lumped steady-state model, the algebraic sum of branch currents at a node is zero.
      fr: Dans le modèle concentré en régime permanent déclaré, la somme algébrique des courants de branche en un nœud est nulle.
    claim_class: concept-stable
    importance: major
    verification_route: derivation
    evidence:
      derivation_or_test: design-brief.yml model domain; model/kirchhoff_model.py and test_kirchhoff_model.py KCL assertions
      primary_source: null
      independent_checker: pending-qualified-reviewer
      checked_on: null
      result: executable authoring oracle passes; independent disposition pending
    assumptions_and_domain: charge accumulation at each modeled node is negligible over the observation interval; branch directions are declared
    expected_range: numerical residual below 1e-12 A in the analytical oracle; physical residual judged against propagated measurement uncertainty
    affected_assets:
      en: [ESE111-CH04-CH-en, ESE111-CH04-SLIDES-en, ESE111-CH04-LAB01-en]
      fr: [ESE111-CH04-CH-fr, ESE111-CH04-SLIDES-fr, ESE111-CH04-LAB01-fr]
      shared: [ESE111-CH04-MODEL-01, ESE111-CH04-FIG-001]
    context_ids: []
    reviewer: pending-qualified-technical-reviewer
    reviewed_on: null
    review_due: null
    review_trigger: model-domain or topology change; failed numerical or physical balance
    status: proposed
    limitations_to_publish: this does not assert zero instantaneous charge density or replace electromagnetic-field analysis
