brief_id: ESE111-CH04-BRIEF
semantic_id: ESE111-CH04
version: 0.1.0
lifecycle: brief
title:
  en: Kirchhoff Models
  fr: Modèles de Kirchhoff
audience:
  course: ESE111 DC Circuits and Measurement
  readiness: secondary-school algebra, SI units, Ohm's law, safe DMM voltage measurement
  competence_level: assisted-to-independent transition at Level 1
  language_routes: [en, fr]
scope:
  duration:
    chapter_self_study_min: 150
    interactive_studio_min: 90
    problem_set_min: 120
    guided_lab_min: 150
    practical_check_min: 25
  learning_cycle: [discover, understand, experiment, analyze, design]
  model_domain: lumped, resistive, steady-state DC networks with one declared reference node
  exclusions:
    - mains, high voltage, batteries under test, capacitive stored energy, and intentional heating
    - distributed, high-frequency, nonlinear, time-varying, or electromagnetic-field analysis
    - direct current-input DMM measurement before separate qualification
outcomes:
  - id: ESE111-CH04-LO01
    maps_to: [ESE111-CO01, PLO-01]
    statement:
      en: Assign references and use KCL, KVL, and resistor relations to predict every named node voltage and branch current.
      fr: Choisir les références et utiliser les lois des nœuds, des mailles et des résistances pour prévoir chaque tension de nœud et chaque courant de branche nommé.
    evidence: signed equations, units, solved values, and an independent power-balance check
  - id: ESE111-CH04-LO02
    maps_to: [ESE111-CO01, PLO-07]
    statement:
      en: Measure source and node voltages safely, state instrument and component uncertainty, and quantify model-to-measurement residuals.
      fr: Mesurer en sécurité la source et les tensions de nœud, déclarer les incertitudes des instruments et composants, puis quantifier les écarts entre modèle et mesure.
    evidence: individual instrument decisions, raw readings, expanded uncertainty with coverage factor, residuals, and guard-banded decisions
  - id: ESE111-CH04-LO03
    maps_to: [ESE111-CO01, PLO-08]
    statement:
      en: Localize an open or wrong-value branch using ranked hypotheses and one discriminating measurement at a time.
      fr: Localiser une branche ouverte ou de valeur incorrecte en classant les hypothèses et en choisissant une mesure discriminante à la fois.
    evidence: observe-hypothesize-test-update log and corrected acceptance rerun
  - id: ESE111-CH04-LO04
    maps_to: [ESE111-CO01, PLO-01, PLO-07]
    statement:
      en: Redesign branch R4 so TP-B meets its voltage window without exceeding the source-current budget, then verify the change.
      fr: Redimensionner la branche R4 afin que TP-B respecte sa fenêtre de tension sans dépasser le budget de courant de la source, puis vérifier la modification.
    evidence: trade study, selected standard value, predicted range, measured result, and limitation
prerequisites:
  required:
    - distinguish voltage across an element from current through a branch
    - apply Ohm's law with coherent SI prefixes
    - solve two simultaneous linear equations by substitution or elimination
    - identify breadboard continuity and make de-energized resistance checks
    - pass or work under the supervision route of G1 Safe bench user
  retrieval_items:
    - Convert 75 microamperes to amperes and milliamperes.
    - Determine the current through 10 kOhm at 2 V and state its direction from the chosen reference.
    - Explain why a voltmeter is connected across two nodes.
  remediation_routes:
    algebra: ESE111-CH04-REM-algebra
    units: ESE111-CH04-REM-units
    dmm: ESE111-CH04-REM-dmm
misconceptions:
  - id: kcl-current-consumed
    belief: current is used up at a resistor or node
    evidence_to_surface: predicted branch currents do not sum at TP-A
    discriminating_move: compare signed current into TP-A with the two currents out
  - id: voltage-at-a-point
    belief: voltage belongs to one point without a reference
    evidence_to_surface: changing the reference seems to change circuit behavior
    discriminating_move: report both nodes and show invariant voltage differences
  - id: sign-means-error
    belief: a negative solved current makes the solution invalid
    evidence_to_surface: learner reverses a correct equation to force a positive answer
    discriminating_move: retain the chosen arrow and interpret the negative sign as opposite flow
  - id: meter-is-invisible
    belief: measuring cannot change the network
    evidence_to_surface: TP-B differs systematically between 1 MOhm and 10 MOhm input paths
    discriminating_move: add meter input resistance as a parallel branch and recompute
  - id: more-digits-more-truth
    belief: display resolution alone establishes accuracy
    evidence_to_surface: uncertainty claim omits accuracy, tolerance, contact, and source variation
    discriminating_move: separate resolution, accuracy specification, repeatability, and model uncertainty
  - id: debug-by-replacement
    belief: replacing components is the fastest first diagnostic action
    evidence_to_surface: no hypothesis or pre-change evidence survives
    discriminating_move: require one test whose possible outcomes separate at least two hypotheses
vocabulary:
  shared_symbols:
    - {symbol: V_S, meaning_en: source voltage, meaning_fr: tension de source, unit: V}
    - {symbol: V_A, meaning_en: TP-A relative to COM, meaning_fr: TP-A par rapport à COM, unit: V}
    - {symbol: V_B, meaning_en: TP-B relative to COM, meaning_fr: TP-B par rapport à COM, unit: V}
    - {symbol: I_k, meaning_en: current in the arrow direction of branch k, meaning_fr: courant dans le sens de la flèche de la branche k, unit: A}
    - {symbol: epsilon_KCL, meaning_en: signed current residual, meaning_fr: résidu algébrique de courant, unit: A}
  glossary_ids: [ee.voltage, ee.current, ee.resistor, ee.node, ee.branch, ee.open.circuit, ee.short.circuit, ee.uncertainty]
model_limits:
  valid_when:
    - dimensions are small and behavior is slow enough for a lumped steady-state model
    - resistor temperature is near the characterization condition and self-heating is negligible
    - source, wiring, contacts, and instruments are represented to the precision needed for the decision
  invalid_or_incomplete_when:
    - fields, propagation delay, induced voltage, or time variation are not negligible
    - a component is nonlinear, temperature-dependent, intermittent, damaged, or outside its rating
    - instrument loading or source resistance is comparable to the network resistance
safety:
  contract: ESE-SAF-TC-001 version 0.1.0
  level: L1
  source_limits: {open_circuit_voltage_max_v: 6.1, current_limit_max_a: 0.02, available_power_max_w: 0.122}
  circuit_fault_bound: hard short after R1 is limited by R1 to approximately 0.61 mA at the maximum declared source voltage
  rules:
    - use only an institution-approved protected source; output off during changes
    - use fused, function-checked leads in COM and V/Ohm; do not use the current jack
    - obtain the de-energized setup checkpoint before first energization and after any topology change
    - stop for unexpected heat, odor, damage, unstable reading, source current-limit indication, or a value outside the approved envelope
  unresolved_authority: numeric activity limits and supervision require the deploying safety authority and physical-path approval
context:
  engineering_question:
    en: How can a technician decide whether a repairable low-voltage indicator or sensor branch matches its schematic, and change a threshold without exceeding the current budget?
    fr: Comment un technicien peut-il décider si une branche réparable d'indication ou de capteur basse tension correspond à son schéma, puis modifier un seuil sans dépasser le budget de courant ?
  layer: universal-core
  candidate_context_id: CTX-BJ-ENERGY-001
  candidate_status: review-not-approved
  selection_decision: blocked-until-M01-authority-approval
  use_boundary: no local need, stakeholder, availability, origin, or deployment claim may be inferred from the candidate
  portable_alternative:
    en: Use the same resistor network as a generic repair-training fixture; the threshold, current-budget, fault, measurement, and verification decisions are unchanged.
    fr: Utilisez le même réseau résistif comme maquette générique de formation à la réparation ; le seuil, le budget de courant, la panne, la mesure et la vérification restent inchangés.
assessment_acceptance:
  rubric_mastery_level: 3
  progression_target: 2
  required_actions:
    - predict signs and approximate magnitudes before calculation
    - solve the two-node model with units and verify KCL plus power balance
    - personally choose reference, DMM function/range, and safe test-point sequence
    - quantify disagreement using signed residuals and a declared expanded uncertainty with coverage factor
    - localize a seeded open or wrong-value branch without random replacement
    - select a standard R4 value and verify TP-B and source-current requirements after change
  thresholds:
    model: all node voltages and branch currents within 1 percent of the independent oracle for the assigned parameters
    measurement: raw values retained; expanded uncertainty U and coverage factor k are traceable; discrepancies beyond U are investigated
    debugging: root-cause claim supported by a discriminating test and a successful post-correction rerun
    design: the full measured intervals [TP-B minus U, TP-B plus U] and [source current minus U, source current plus U] remain inside 1.40–1.52 V and at or below 0.25 mA under the recorded test condition
    safety: all conjunctive stop, inspection, and authorized-energy rules satisfied
evidence_and_dependencies:
  entry_evidence: [individual prediction, prerequisite diagnostic, setup inspection]
  retained_evidence: [equations, simulation record, raw CSV, uncertainty budget, fault log, redesign verification, short defense]
  downstream:
    - resistor dividers and sensor loading in ESE111 weeks 7-8
    - tolerance and repeated-measurement reasoning in ESE111 weeks 11-12
    - RC nodal models in ESE121
    - sensor-interface characterization in Project M1
  assessment_map:
    chapter_exit: ESE111-CH04-EXIT
    problem_set: ESE111-CH04-PSET01
    laboratory: ESE111-CH04-LAB01
    practical: ESE111-CH04-PRACT01
    mcq_bank: ESE111-CH04-MCQ
