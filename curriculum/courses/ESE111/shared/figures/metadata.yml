  long_description_en: Read left to right from the 6 V source through 10 kOhm R1 to TP-A. From TP-A, 22 kOhm R2 goes down to COM and 33 kOhm R3 goes right to TP-B. From TP-B, R4 goes down to COM; it is 15 kOhm initially and 22 kOhm after redesign. I1 and I3 point right; I2 and I4 point toward COM.
  long_description_fr: Lisez de gauche à droite depuis la source de 6 V, à travers R1 de 10 kOhm, jusqu'à TP-A. Depuis TP-A, R2 de 22 kOhm descend vers COM et R3 de 33 kOhm va vers TP-B. Depuis TP-B, R4 descend vers COM ; sa valeur initiale est 15 kOhm et sa valeur redimensionnée 22 kOhm. I1 et I3 sont orientés vers la droite ; I2 et I4 vers COM.
