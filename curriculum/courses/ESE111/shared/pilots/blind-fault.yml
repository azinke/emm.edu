record_id: ESE111-CH04-E3-BLIND-FAULT
version: 0.1.0
status: protocol-ready-no-runs
public_fault_classes: [open-branch, incorrect-value-branch]
restricted_reference: RST-ESE111-CH04-FAULT-001
roles:
  custodian: selects and inserts the reversible variant; does not teach or score the diagnostic sequence
  pilot_instructor: receives normal notes and public fault class only; does not receive location/value
  observer: timestamps instructor decisions and records prompts without revealing the fault
  safety_controller: may stop or reveal when safety is at risk; records the override
controls:
  - exact branch/value, randomization seed, insertion steps, expected signatures, reset and integrity key stay in the separately controlled store
  - publish before the run only a SHA-256 commitment to the exact variant record, never the secret or a reversible encoding
  - custodian function-checks healthy, faulted, and restored states with output off except approved voltage checks
  - fault must be reversible, inside the approved energy envelope, visually concealed without defeating inspection competence, and unable to damage apparatus
  - instructor may ask normal safety and reasoning prompts but may not be coached toward the location
observation_fields:
  - initial symptom description and time
  - ranked hypotheses, stated assumptions, and predicted outcomes
  - each selected test, safety checkpoint, result, update, and elapsed time
  - random replacement, leading prompt, accidental reveal, equipment anomaly, stop, and recovery
  - root-cause claim, correction authorization, restored acceptance, and prevention note
distinction_acceptance:
  open_branch: instructor tree reaches a continuity/value or node-signature test that separates isolation from a low return branch
  incorrect_value_branch: instructor tree reaches a value or node-signature test that separates wrong resistance from open link/reference/source causes
  both: no unsafe probing, random replacement, or answer-revealing prompt; successful baseline after reset
public_result: variant commitment, class, redacted decision path, timing range, acceptance, defects, and checksum only
result: pending
