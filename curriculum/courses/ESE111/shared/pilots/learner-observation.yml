record_id: ESE111-CH04-E4-OBSERVATION
version: 0.1.0
status: instrument-ready-no-observations
unit_of_record: one consented participant in one exact language/apparatus/session baseline
observer_contract:
  role: record observable action and exact utterance fragment where authorized; do not infer motive, fluency, disability, or intelligence
  intervention: safety controller may stop at any time; otherwise use only the numbered neutral prompt ladder and timestamp it
  separation: instructor does not score hidden observer notes during the session; observer is not the fault custodian
header_fields: [study_code, authority_record, consent_record, baseline_commit, language_route, readiness_band, prior_exposure_band, functional_access_route, apparatus_path, session_id, instructor_id, observer_id, started_at, ended_at]
prompt_scale:
  0: independent action or explanation
  1: repeat/rephrase task without technical cue
  2: point to the relevant public representation or stop rule
  3: name a principle or branch without giving the operation/result
  4: demonstrate or reveal the action; mark the outcome not independently demonstrated
domains:
  prediction:
    observe: [relative_order_of_nodes, current_split, open_branch_prediction, confidence_and_reason]
    evidence: first committed response retained before calculation
  representation_and_model:
    observe: [COM_reference, arrows_and_polarities, branch_to_equation_trace, KCL_A, KCL_B, KVL_loop, unit_and_sanity_check]
    misconception_tags: [current_consumed, voltage_without_reference, negative_means_error, calculator_without_check]
  setup_and_instrument:
    observe: [output_off_change, inspection_sequence, COM_and_voltage_sockets, function_range, first_test_point_rationale, checkpoint_request, stop_response]
    critical_tags: [current_input, live_change, bypassed_checkpoint, ignored_stop]
  discussion:
    observe: [claim_with_evidence, question_to_peer, revision_after_counterexample, equitable_turn, language_or_term_block]
    rule: discussion evidence is descriptive and never substitutes for individual competence
  measurement_and_uncertainty:
    observe: [raw_value_retained, meter_loading_branch, residual_sign, U_and_k_basis, anomaly_retained, guard_band_decision]
  debugging:
    observe: [symptom_statement, three_ranked_hypotheses, predicted_test_outcomes, discriminating_test, update_after_result, no_random_replacement]
  cognitive_load:
    observe: [long_pause_location, representation_switch, reread_count, working_memory_breakdown, voluntary_effort_rating_1_to_7]
    interpretation: effort rating is a conversation aid, not a diagnostic or psychometric scale
  timing:
    timestamps: [prediction_commit, first_equation, model_check, setup_ready, first_reading, diagnostic_choice, root_cause_update, design_decision, defense_end]
    interruptions: distinguish material, apparatus, access, instruction, consent, and unrelated causes
  transfer:
    prompt: new source/resistor or meter condition with the same topology and decision structure
    observe: [estimate_direction, model_revision, acceptance_rule, limitation]
event_row_fields: [timestamp, domain, observable_action, exact_public_prompt_id, prompt_level, artifact_or_test_point, result_code, misconception_or_access_tag, safety_action, observer_note]
result_codes: [independent-correct, self-corrected, correct-after-neutral-prompt, correct-after-technical-cue, demonstrated-not-independent, incorrect-safe, critical-stop, not-observed, withdrawn]
closeout:
  participant_check: invite correction of observer factual errors without pressuring agreement with interpretation
  integrity: retain original record; amendments append author, time, reason, and prior checksum
  deidentification: remove free-text identity and third-party details before analysis
result: pending
