record_id: ESE111-CH04-E4-PARITY-ANALYSIS
version: 0.1.0
status: plan-registered-no-data
analysis_intent: compare whether both language routes preserve the same technical construct, cognitive demand, safety decision, evidence threshold, accessibility route, and burden; identify revision targets without causal or population claims
freeze_before_first_session: [baseline, exclusions, matching_variables, prompt_scale, essential_actions, thresholds, item_slots, defect_classes, analysis_tables, missing_data_rules]
data_quality:
  include: authorized consent; exact baseline known; usable observer record; no answer exposure before the recorded action
  retain_but_flag: interruption, apparatus anomaly, access adaptation, instructor deviation, partial withdrawal where authorized
  exclude_from_action_rate: withdrawn before action, invalid consent, wrong baseline, revealed answer; report every exclusion by route and reason
  missing: show denominator for every cell; never impute a correct action or favorable parity
descriptive_tables:
  - route counts, readiness/access/apparatus bands, withdrawals, exclusions, prompts, and interruptions
  - per essential action counts by result code and language route
  - segment time median, range, and all individual values in deidentified form when disclosure risk permits
  - misconception and wording/access-theme counts with representative short compliant excerpts
  - item-slot response distribution and distractor rationale by route; no percent without numerator/denominator
small_sample_rules:
  prohibited: [null_hypothesis_significance_test, powered_equivalence_claim, causal_language_effect, demographic_subgroup_ranking, classical_DIF_claim, item_reliability_claim]
  permitted: exact counts, medians/ranges, paired construct review, case comparison, uncertainty about the observation process, and explicit decision triggers
  interpretation: a one-learner difference may be practically important but is not a stable population estimate; a zero difference is not proof of equivalence
wording_vs_concept_adjudication:
  reviewers: fluent EN technical educator, fluent FR technical educator, technical construct reviewer, and accessibility reviewer; none resolves alone
  blind_packet: deidentified action, prompt level, relevant excerpt, diagram/data version, and paired source segment without route totals where feasible
  wording_signal: learner succeeds after meaning-preserving rephrase; term/grammar or reference ambiguity repeats; paired editions encode different cue or burden
  conceptual_signal: same misconception appears across routes/representations and persists after neutral rephrase with prerequisite evidence otherwise adequate
  mixed_or_unknown: log both and revise/test cautiously; do not force a binary label
  output_fields: [issue_id, source_location, construct, routes, cases, classification, rationale, proposed_paired_change, owner, due, rerun]
item_behavior:
  scope: pilot-ready 8-12 item slots only after controlled items and keys exist
  checks: answer-key integrity, option plausibility, misconception selection, reading burden, cueing, prompt dependence, response time, and explanation naturalness
  action_rule: any wrong key, leaked cue, safety ambiguity, or construct change is critical; a route gap greater than one response triggers paired item review, not deletion or a DIF claim
decision:
  pass_to_revision_review: all critical defects closed; no route uses a lower threshold; essential-action and burden triggers are dispositioned with evidence; reviewers accept paired semantic/cognitive parity
  insufficient: minimum interpretive set or matched coverage absent; report limits and seek an approved amendment rather than claiming parity
  fail: unresolved technical/safety/consent/access defect, different construct, unexplained prompt asymmetry, or selective omission of negative cases
outputs: [analysis_table, adjudication_log, item_slot_report, limitations, reviewer_decisions, immutable_data_and_code_checksums]
result: pending
