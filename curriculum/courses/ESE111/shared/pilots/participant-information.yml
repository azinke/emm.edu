record_id: ESE111-CH04-E4-PARTICIPANT-INFORMATION
version: 0.1.0
status: draft-not-approved-not-a-consent-form
authority_note: deploying authority must insert accountable contacts, lawful/ethical basis, retention, withdrawal deadline, compensation, safeguarding, complaints, and signature/assent route before use
shared_semantic_contract:
  purpose: improve the clarity, accessibility, timing, and EN/FR parity of one low-voltage circuits unit
  activities: prerequisite questions, prediction, equations, approved low-voltage setup, voltage measurement, diagnosis, redesign decision, and short feedback interview
  voluntariness: participation is optional; refusal or withdrawal has no grade, service, immigration, employment, or instructor-relationship penalty
  foreseeable_burden: mental effort, possible frustration, approximately three hours, ordinary approved L1 bench participation, and optional comments
  alternatives: decline; use ordinary course support; request an approved accessible route; skip any optional recording
  data: deidentified actions, answers, prompts, timings, access-route function, and comments; contact/consent data stored separately
  limits: confidentiality cannot be promised beyond the approved controls and applicable duties; safety or safeguarding events may require reporting
  results: only grouped/deidentified formative findings and short compliant quotations may be published under the approved route
localized:
  en:
    title: Information for the ESE111 Chapter 4 formative pilot
    invitation: You are invited to help us find confusing, inaccessible, or unnecessarily difficult parts of a bilingual circuits lesson. The pilot evaluates the material, not your worth or intelligence.
    choice: Taking part is your choice. You may pause, ask for an approved adaptation, skip an optional feedback question, or withdraw under the approved procedure without academic penalty.
    activity: You will predict a small resistor network, explain equations, use an approved low-voltage setup only after its safety checkpoint, make voltage measurements, diagnose evidence, and decide whether a redesign meets its limits.
    risk_and_stop: The activity stays within the approved low-voltage route. Stop immediately for damage, heat, odor, unstable readings, current-limit indication, an unexpected configuration, distress, or uncertainty about what to do.
    privacy: The learning record uses a study code, not your name. Contact and consent records are separate. No recording is permitted unless you receive and accept a separate approved choice.
    questions: Ask the future named pilot contact or independent complaints contact before deciding; these contacts are not yet approved, so recruitment cannot begin.
  fr:
    title: Information sur le pilote formatif du chapitre 4 d'ESE111
    invitation: Nous vous invitons à repérer les passages confus, inaccessibles ou inutilement difficiles d'une leçon bilingue de circuits. Le pilote évalue le matériel, non votre valeur ni votre intelligence.
    choice: La participation est libre. Vous pouvez faire une pause, demander une adaptation approuvée, omettre une question facultative ou vous retirer selon la procédure approuvée, sans pénalité académique.
    activity: Vous prévoirez un petit réseau résistif, expliquerez des équations, utiliserez une maquette basse tension approuvée après le contrôle de sécurité, mesurerez des tensions, diagnostiquerez des indices et jugerez si une modification respecte ses limites.
    risk_and_stop: L'activité reste dans la voie basse tension approuvée. Arrêtez immédiatement en cas de dommage, chaleur, odeur, lecture instable, limitation de courant, configuration inattendue, détresse ou doute sur la conduite à tenir.
    privacy: Le relevé d'apprentissage emploie un code d'étude, pas votre nom. Les coordonnées et consentements sont séparés. Aucun enregistrement n'est permis sans choix distinct, approuvé et accepté.
    questions: Consultez le futur responsable du pilote ou le contact indépendant de réclamation avant de décider ; ces contacts ne sont pas encore approuvés, donc le recrutement ne peut commencer.
parity_check: each localized field must receive natural-language review and semantic back-check; neither edition may omit voluntariness, stop, privacy, adaptation, withdrawal, or contact limitations
result: pending-authority-and-language-review
