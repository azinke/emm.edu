contract_version: 1.0.0
hooks:
  - id: ESE111-CH04-EVIDENCE-GATE-TESTS
    kind: code
    command: [python3, -m, unittest, discover, -s, "{manifest_dir}", -p, "test_*.py"]
    working_directory: "{manifest_dir}"
    requires: [python3]
    timeout_seconds: 30
    network: false
    required: true
  - id: ESE111-CH04-EVIDENCE-STATUS
    kind: code
    command: [python3, "{manifest_dir}/validate_evidence.py", "{manifest_dir}/status.yml"]
    working_directory: "{manifest_dir}"
    requires: [python3]
    timeout_seconds: 30
    network: false
    required: true
