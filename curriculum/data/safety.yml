{
  "schema_version": "1.0.0",
  "version": "1.1.0",
  "status": "draft",
  "levels": [
    {
      "id": "L0",
      "scope": "observation, simulation, and verified de-energized inspection or assembly",
      "authorization_gate": null,
      "supervision": "staff present or an approved low-risk activity plan; energization is not permitted",
      "stop_conditions": [
        "unknown energy source",
        "stored energy not discharged and verified",
        "damaged apparatus"
      ]
    },
    {
      "id": "L1",
      "scope": "approved current-limited extra-low-voltage core work; planning caps normally no more than 12 V DC, 1 A, 12 W fault power, and 0.25 J accessible capacitor energy, all pending institutional safety review and activity-specific confirmation",
      "authorization_gate": "G1",
      "supervision": "at least one trained instructor or assistant per 12 learners; before G1, direct-supervised instructor-controlled stations with instructor-controlled energization",
      "stop_conditions": [
        "unexpected heat, smell, smoke, arcing, motion, damaged insulation, unstable supply, or measurement outside expected bounds",
        "missing G1 for independent energization",
        "source, protection, conductor, probe, or stored-energy value outside the approved activity envelope"
      ]
    },
    {
      "id": "L2",
      "scope": "approved energy-limited extra-low-voltage work; planning caps normally no more than 24 V DC, 2 A, and 48 W plus soldering, bounded low-energy motors, protected batteries, and bench instruments, all pending institutional safety review and activity-specific confirmation",
      "authorization_gate": "current G1 plus task qualification; G3 certifies independent soldering progression but is not required for first direct-supervised solder exposure after an L2 task briefing",
      "supervision": "at least one trained instructor or assistant per 12 learners; direct supervision for first exposure and where the activity risk assessment requires it",
      "stop_conditions": [
        "any permit, guard, extraction, PPE, current limit, fuse, probe rating, or supervision failure",
        "unexpected thermal, electrical, chemical, battery, or rotating behavior",
        "configuration outside the approved L2 activity envelope"
      ]
    },
    {
      "id": "L3",
      "scope": "institution-controlled higher fault-energy DC, converters, battery packs, accessible thermal or rotating hazards, chemicals or coatings, or lawful RF transmission outside L2 but not assigned to L4",
      "authorization_gate": "activity-specific risk assessment, current task authorization, and instructor sign-off",
      "supervision": "qualified local controller; at least one trained controller per 8 learners for unfamiliar L3 work, with direct supervision whenever required by the approved activity",
      "stop_conditions": [
        "any approval, permit, enclosure, interlock, PPE, extraction, legal condition, emergency control, or supervision failure",
        "energy, temperature, movement, exposure, field, or measurement outside the approved bounds"
      ]
    },
    {
      "id": "L4",
      "scope": "mains, high voltage, high-energy storage, lasers, or safety-critical equipment under an adopted institutional procedure",
      "authorization_gate": "named institutional approval and task permit; advanced course only",
      "supervision": "continuous direct supervision by qualified personnel under the adopted institutional procedure",
      "stop_conditions": [
        "any deviation from the approved L4 procedure, permit, equipment, environment, or direct-supervision condition",
        "any interlock, protective-earth, isolation, enclosure, emergency-response, or communication failure"
      ]
    }
  ],
  "prohibited_self_study": [
    "mains",
    "high-energy battery",
    "RF power",
    "high voltage"
  ],
  "incident_owner": "institutional-safety-lead-pending-appointment"
}
