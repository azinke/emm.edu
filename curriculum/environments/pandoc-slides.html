<!doctype html>
<html lang="$lang$">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>$if(title)$$title$$else$Slides$endif$</title>
  <style>
    :root { color-scheme: light; font-family: "Noto Sans", "DejaVu Sans", sans-serif; }
    body { margin: 0; background: #f4f5f7; color: #17202a; }
    main { width: min(92vw, 80rem); margin: 2vh auto; }
    .slide { box-sizing: border-box; min-height: 90vh; padding: 6vh 7vw; background: white; border: 1px solid #ccd1d1; box-shadow: 0 .25rem 1rem #0002; }
    .slide:not([data-active="true"]) { display: none; }
    h1, h2 { line-height: 1.15; }
    img, svg { max-width: 100%; max-height: 62vh; }
    pre { white-space: pre-wrap; }
    #counter { position: fixed; right: 1rem; bottom: .5rem; font-size: .8rem; }
    @media print {
      body { background: white; }
      main { width: 100%; margin: 0; }
      .slide, .slide:not([data-active="true"]) { display: block; min-height: 0; height: 190mm; padding: 12mm; border: 0; box-shadow: none; break-after: page; }
      #counter { display: none; }
    }
  </style>
  $for(header-includes)$$header-includes$$endfor$
</head>
<body>
<main id="deck">
  <section class="slide" data-active="true">
    $if(title)$<h1>$title$</h1>$endif$
    $if(subtitle)$<p>$subtitle$</p>$endif$
  </section>
  $body$
</main>
<div id="counter" aria-live="polite"></div>
<script>
(() => {
  const deck = document.querySelector('#deck');
  const sections = [...deck.querySelectorAll('section.level1, section.level2')];
  sections.forEach(node => {
    node.classList.add('slide');
    deck.appendChild(node);
  });
  const slides = [...deck.querySelectorAll(':scope > .slide')];
  let index = 0;
  const show = next => {
    index = Math.max(0, Math.min(slides.length - 1, next));
    slides.forEach((slide, i) => slide.dataset.active = String(i === index));
    document.querySelector('#counter').textContent = String(index + 1) + ' / ' + String(slides.length);
    slides[index].focus({preventScroll: true});
  };
  addEventListener('keydown', event => {
    if (['ArrowRight', 'PageDown', ' '].includes(event.key)) show(index + 1);
    if (['ArrowLeft', 'PageUp'].includes(event.key)) show(index - 1);
    if (event.key === 'Home') show(0);
    if (event.key === 'End') show(slides.length - 1);
  });
  show(0);
})();
</script>
</body>
</html>
