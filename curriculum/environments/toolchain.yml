contract_version: 1.0.0
cohort_baseline: "2026"
offline_required: true
network_during_build: forbidden

tools:
  python:
    tested: "3.13.13"
    supported: ">=3.11,<3.14"
    required: true
  pyyaml:
    tested: "6.0.2"
    supported: ">=6.0,<7"
    required: true
  quarto:
    tested: "1.7.x"
    supported: ">=1.6,<1.8"
    required_for_release: true
    fallback: pandoc
  pandoc:
    tested: "3.1.11.1"
    supported: ">=3.1,<4"
    required_for_offline_fallback: true
  xelatex:
    tested: "TeX Live 2023 (local fallback); CI uses Quarto TinyTeX frozen with the cohort image"
    required_for_pdf: true
  kicad_cli:
    tested: "9.0.9"
    supported: ">=9.0,<10"
    required_before_m10: true
  imagemagick:
    tested: "7.x"
    required_for_visual_regression: false
  poppler:
    tested: "25.x"
    required_for_release: true
    executables: [pdfinfo, pdffonts, pdftotext, pdftoppm]

lowest_supported_student_profiles:
  - id: linux-x86_64-low
    os: "Ubuntu 24.04 LTS or equivalent 64-bit Linux"
    cpu: "2 cores, x86-64, 2.0 GHz"
    ram_gib: 4
    free_storage_gib: 12
    display: "1366x768"
    target_full_build_minutes: 20
    status: requires_physical_benchmark
  - id: windows-x86_64-low
    os: "Windows 11 23H2 64-bit"
    cpu: "2 cores, x86-64, 2.0 GHz"
    ram_gib: 4
    free_storage_gib: 12
    display: "1366x768"
    target_full_build_minutes: 25
    status: requires_physical_benchmark

bundle:
  required_contents:
    - source
    - Python runtime and locked packages
    - Quarto and Pandoc
    - TeX engine and bilingual fonts
    - KiCad libraries required by teaching projects
    - simulation, HDL, and code toolchains declared by unit manifests
    - external-link archival copies whose licenses permit redistribution
  checksum_algorithm: sha256
  manifest: offline-bundle-manifest.sha256
