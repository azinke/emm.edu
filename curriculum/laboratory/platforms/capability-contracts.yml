contract_set_id: M03-E2-CAP-001
version: 1.0.0
status: specification
source_of_truth:
  document: ESE-CMD-001
  version: 0.2.0
  sections: ["8.1", "8.2", "8.3", "8.4"]
review:
  cadence: each-cohort-freeze-and-annual
  owner: platform-engineering-lead
  triggers:
    - candidate-hardware-or-assembly-revision
    - datasheet-or-errata-change
    - toolchain-driver-or-host-os-change
    - lifecycle-security-or-radio-status-change
    - supplier-channel-or-total-cost-change
    - failed-golden-project-or-field-anomaly

common_requirements:
  identity:
    - exact manufacturer, orderable part number, assembly revision, and markings
    - authoritative schematic, datasheet/reference manual, errata, and retrieval date
    - sample serial or asset IDs and supplier-channel provenance in controlled records
  electrical:
    - document recommended operating limits separately from absolute maximum ratings
    - document every exposed I/O domain and whether any pin is tolerant of another voltage
    - default to not-tolerant when tolerance is not guaranteed by authoritative documentation
    - identify source/sink limits, aggregate limits, analog reference domain, and power-backfeed risks
    - qualify with current-limited extra-low-voltage fixtures and rated leads
  tooling:
    - ordinary build, flash/program, recovery, and debug path works from frozen offline bundle
    - command lines, versions, licenses, USB drivers, and host architectures are archived
    - no required cloud account, paid seat, or proprietary-only student artifact
  recovery:
    - documented recovery from a malformed application and interrupted programming
    - recovery does not require an irreversible operation or an undocumented fixture
    - at least one known-good staff recovery route and one substitute-aware troubleshooting card
  lifecycle_and_supply:
    - two independent procurement channels are sampled where practicable
    - lifecycle status, counterfeit/clone exposure, replacement lead time, and substitute route are reviewed
    - 10-to-15-percent board spares and two instructor-qualified substitute exemplars are planned
  cost:
    - record quantity, source currency, deployment currency, exchange basis/date, tax, duty, freight, accessories, probes, storage, repair, spares, and replacement cycle
    - accept only within an approved cohort total-cost and access model; no universal price is asserted here
  evidence:
    - manufacturer claims are source evidence, not proof that the received sample works
    - retain raw logs, photos where appropriate, hashes, measurements, anomalies, and independent reviewer disposition
    - run the applicable golden-project tests on every exact primary and substitute variant
  universal_rejection_gates:
    - undocumented or ambiguous I/O electrical limits
    - required cloud connectivity after offline-bundle installation
    - no repeatable boot/program recovery route
    - counterfeit or identity uncertainty unresolved after inspection
    - required assessment action hidden behind an uninspectable framework
    - open critical safety defect or prohibited radio configuration
    - qualification requires irreversible security state on reusable stock

contracts:
  - id: CAP-MCU-FOUNDATION
    planned_use: first-mcu-encounter
    reference_ladder: Pico-2-or-capability-equivalent
    learning_actions:
      - inspect pin and peripheral mappings rather than copy an opaque sketch
      - implement GPIO input/output, ADC acquisition, timer/PWM, interrupt, and serial-bus exercises
      - recover a board after a deliberately non-working application image
      - build and load C/C++ and the approved introductory interpreted-language path offline
    io_voltage:
      acceptance: all exposed logic and power domains are explicitly mapped; student fixtures prevent incompatible-voltage connection and backfeed
      record: [nominal_logic_voltage, recommended_ranges, absolute_maxima, pin_current_limits, aggregate_current_limits, five_volt_tolerance, power_paths]
    adc:
      acceptance: at least one externally accessible ADC path supports calibration, quantization, source-impedance, and repeatability learning
      record: [channel_pins, resolution_modes, reference_source, input_range, acquisition_constraints, documented_nonidealities]
    timers:
      acceptance: independent timebase plus measurable PWM/capture-or-equivalent route supports timing and interrupt work
      record: [timer_blocks, pwm_pins, counter_widths, clock_sources, capture_compare_routes]
    buses:
      acceptance: externally accessible UART, SPI, and I2C-or-professionally-equivalent synchronous two-wire bus
      record: [instances, pin_routes, controller_target_modes, voltage_domain, pullup_requirements]
    memory:
      acceptance: fits all foundation golden artifacts and approved introductory runtime with measured build and runtime headroom
      record: [nonvolatile_bytes, ram_bytes, reserved_regions, golden_artifact_usage, headroom]
    debug:
      acceptance: source-level or register-visible hardware-debug route is documented even if classroom introduction begins with bootloader/serial diagnostics
      record: [interface, connector_or_test_points, supported_probes, uart_route, limitations]
    radio:
      acceptance: not required; if fitted, disabled by default until jurisdiction and activity approval
      record: [fitted, technologies, default_state, disable_method, jurisdiction_record]
    logic:
      acceptance: programmable timing/interface resource may enrich learning but is not required; its behavior must be documented if assessed
      record: [special_logic_or_io_engine, visibility, tool_support]
    toolchain:
      acceptance: reproducible offline C/C++ build plus approved introductory-language install; warnings and observable binary/resource report enabled
    recovery:
      acceptance: student-safe bootloader/recovery mode restores an ordinary board without permanent configuration change
    lifecycle:
      acceptance: cohort supply, documentation, assembly revision, and capability-equivalent substitute are reviewable
    cost:
      acceptance: board, cable, headers, protection fixture, probe allocation, spares, and replacement are included in approved cohort model

  - id: CAP-MCU-PROFESSIONAL
    planned_use: register-level-mcu-rtos-production-debug
    reference_ladder: cortex-m33-nucleo-class-or-capability-equivalent
    learning_actions:
      - configure peripherals from primary reference documentation
      - debug registers, memory, exceptions, timers, concurrency, and low-power behavior
      - run the frozen RTOS baseline without network access
      - compare a second architecture or vendor ecosystem without lowering evidence threshold
    io_voltage:
      acceptance: exact board-to-MCU routing, level domains, on-board debugger isolation, connector rails, and current limits are mapped
      record: [logic_domains, connector_pins, debugger_bridge_domains, protection, backfeed_paths, current_limits]
    adc:
      acceptance: accessible ADC supports trigger/timing, calibration, and documented reference/source constraints; DAC is desirable but not mandatory
      record: [channels, resolution, triggers, reference, sample_time, calibration, dac_if_present]
    timers:
      acceptance: supports PWM, capture/compare, interrupt, and RTOS timebase exercises without resource conflicts hidden from learners
      record: [general_timers, advanced_timers, low_power_timers, capture_compare, clock_tree, reserved_resources]
    buses:
      acceptance: multiple mapped instances collectively support UART, SPI, I2C, and at least one professionally relevant field bus or explicit substitute fixture
      record: [instances, alternate_functions, dma_routes, field_bus, pullups_or_transceivers]
    memory:
      acceptance: bare-metal and RTOS golden artifacts fit with declared stack/heap/flash headroom and observable usage reports
      record: [flash, sram_regions, cache_or_tcm, external_memory, rt_os_usage, headroom]
    debug:
      acceptance: on-board or allocated SWD/JTAG-class probe provides halt, step, breakpoint, register, memory, reset, and serial diagnostics
      record: [interface, probe, connector, trace_if_any, debug_powering, recovery_under_reset]
    radio:
      acceptance: not required; integrated radio is governed by CAP-WIRELESS-NODE as a separate role
      record: [fitted, disabled_state, jurisdiction_record]
    logic:
      acceptance: hardware security/accelerators may be studied only through documented reversible configuration on reusable stock
      record: [accelerators, memory_protection, reversible_security_features, prohibited_permanent_features]
    toolchain:
      acceptance: frozen compiler, build system, probe server, debugger, RTOS source/modules, docs, and tests install and run offline on supported hosts
    recovery:
      acceptance: recover from bad firmware and debugger/boot selection error without readout lock, fuse programming, or permanent debug change
    lifecycle:
      acceptance: exact stocked model/revision is frozen; middleware/security support and substitute RTOS board are reviewed annually
    cost:
      acceptance: includes on-board/external probe, cables, adapters, field-bus transceivers, spare boards, and technician recovery time

  - id: CAP-WIRELESS-NODE
    planned_use: legal-low-power-wireless-telemetry-and-secure-connected-node
    reference_ladder: esp32-c3-c6-or-qualified-zephyr-radio-board
    learning_actions:
      - measure packet, timing, power, failure, and recovery behavior
      - implement authenticated communication in an institution-approved configuration
      - explain antenna, module, software-stack, privacy, and jurisdiction constraints
    io_voltage:
      acceptance: board I/O, module supply peaks, USB/serial bridge, and sensor connector domains are mapped
      record: [logic_voltage, supply_range, peak_current_method, io_limits, bridge_domains, backfeed_paths]
    adc:
      acceptance: ADC is optional for radio role; any assessed ADC use is separately qualified with range and nonidealities
      record: [required, channels, range, limitations]
    timers:
      acceptance: supports timestamp, retry, sleep/wake, and measurable scheduling behavior
      record: [timebases, pwm_or_capture, sleep_clock, stack_reserved_timers]
    buses:
      acceptance: accessible UART plus sensor/peripheral SPI or I2C route; radio coexistence/resource conflicts documented
      record: [uart, spi, i2c, shared_pins, dma_or_interrupt_conflicts]
    memory:
      acceptance: approved radio/security stack and golden artifact fit with measured update/rollback and runtime headroom
      record: [flash, ram, partition_map, stack_usage, update_slots, headroom]
    debug:
      acceptance: wired debug or an equally observable institution-approved route supports fault localization without relying only on radio logs
      record: [interface, probe, uart, crash_dump, limitations]
    radio:
      acceptance: exact module/antenna/firmware configuration has a dated jurisdiction approval before transmission; transmit can be physically or configurationally disabled
      record: [technologies, bands, module_identity, antenna, max_configured_power, region_settings, approval_id, disable_method]
    logic:
      acceptance: hardware crypto use remains inspectable at interface/test-vector level; no irreversible key/fuse operation on reusable boards
      record: [crypto_accelerators, entropy_route, reversible_key_storage, permanent_features_prohibited]
    toolchain:
      acceptance: SDK/RTOS, compiler, debugger, radio test utilities, documentation, and a non-cloud build path are frozen offline
    recovery:
      acceptance: corrupted application and recoverable credential/configuration state can be erased and restored without permanent lockout
    lifecycle:
      acceptance: security-maintenance route, module availability, legal review trigger, and non-radio substitute mode are documented
    cost:
      acceptance: includes antenna, current measurement, programmer/probe, shielding or controlled test arrangement if required, spares, and legal review effort

  - id: CAP-FPGA-EDUCATION
    planned_use: hdl-timing-fsm-and-risc-v-architecture-demonstration
    reference_ladder: ice40-open-flow-capable-board-or-qualified-equivalent
    learning_actions:
      - simulate with a self-checking testbench before hardware
      - synthesize, place, route, inspect timing, program, and measure I/O behavior
      - fit the approved architecture artifact with reported resource and timing headroom
    io_voltage:
      acceptance: every bank voltage, connector pin, current limit, configuration pin, and non-tolerant input is mapped; keyed fixtures prevent bank mismatch
      record: [bank_voltages, connector_pins, io_standards, current_limits, configuration_pins, protection]
    adc:
      acceptance: not required; external converter path is used when an outcome requires ADC
      record: [integrated_if_any, external_fixture_mapping]
    timers:
      acceptance: no fixed peripheral required; board clock/reset resources support measured counters, PWM, and timing constraints
      record: [oscillators, frequencies_and_tolerances, clock_pins, pll_resources, reset_behavior]
    buses:
      acceptance: enough accessible I/O for UART, SPI, I2C, and PMOD-style-or-documented equivalent exercises
      record: [connectors, differential_pairs_if_any, level_domains, programmer_shared_pins]
    memory:
      acceptance: records logic cells/LUTs, flip-flops, block RAM, nonvolatile configuration, and any external RAM; golden architecture fits with predeclared headroom
      record: [logic, flip_flops, block_ram, configuration_memory, external_memory, utilization, headroom]
    debug:
      acceptance: programming interface, observable UART/test points, logic capture route, and recovery from invalid bitstream are documented
      record: [programmer, jtag_or_spi, uart, logic_capture, test_points]
    radio:
      acceptance: not required; radio accessories are separately governed by CAP-WIRELESS-NODE
      record: [fitted, disabled_state]
    logic:
      acceptance: open or approved offline flow exposes synthesis, constraints, place/route, utilization, and timing rather than treating the bitstream as opaque
      record: [device, package, flow, constraints_format, timing_reports, formal_or_lint_route]
    toolchain:
      acceptance: simulator and board flow are preflighted offline on supported hosts; vendor flow may be a documented fallback but installation luck is not assessed
    recovery:
      acceptance: invalid design cannot permanently prevent reprogramming; known-good image and external-programmer route are controlled
    lifecycle:
      acceptance: exact FPGA/package/board revision, programmer, cable, connector mapping, flow support, and substitute are frozen
    cost:
      acceptance: includes programmer, cable, safe I/O fixture, shared build capacity if required, spares, and tool-license cost if any

  - id: CAP-EMBEDDED-LINUX
    planned_use: reproducible-linux-service-device-interface-and-edge-networking
    reference_ladder: raspberry-pi-4-5-class-or-supported-equivalent
    learning_actions:
      - provision and recover a reproducible image from archived source and binaries
      - operate a local service, logs, networking, MCU link, update, and failure case
      - inspect storage, process, memory, boot, permissions, and device-interface behavior
    io_voltage:
      acceptance: GPIO domains, non-tolerant inputs, power-input requirements, USB/network shields, and backfeed routes are documented; protected interface fixtures are used
      record: [gpio_voltage, gpio_limits, power_input, usb_power, backfeed, protection_fixture]
    adc:
      acceptance: integrated ADC is not required; an approved external ADC or MCU bridge preserves measurement outcomes
      record: [integrated_if_any, external_adc_or_mcu_mapping]
    timers:
      acceptance: Linux timing limitations are made visible; deterministic timing outcomes use an MCU/FPGA bridge where required
      record: [kernel_timing_route, gpio_timing_limitations, realtime_configuration_if_any, bridge_mapping]
    buses:
      acceptance: serial console or equivalent recovery plus USB, network, and at least one documented low-voltage peripheral bus
      record: [console, usb, ethernet_or_local_network, wifi_if_enabled, uart, spi, i2c]
    memory:
      acceptance: approved image/service/build fits with measured RAM, swap policy, storage headroom, and recoverable replaceable storage where feasible
      record: [ram, storage_medium, image_bytes, free_space, peak_usage, swap, endurance_and_backup]
    debug:
      acceptance: local console, logs, service diagnostics, boot diagnostics, and MCU-link observability work without internet
      record: [serial_console, local_display_or_ssh, logs, bootloader, kernel_logs, recovery_console]
    radio:
      acceptance: disabled or locally contained until exact configuration has jurisdiction/network/privacy approval
      record: [interfaces, default_state, region, approval_id, disable_method]
    logic:
      acceptance: not required; GPIO is never presented as deterministic logic without measured evidence
      record: [co_processor_or_gpio_controller, limitations]
    toolchain:
      acceptance: image, packages, source, compilers, service dependencies, docs, and checksums are archived; routine provisioning and build work offline
    recovery:
      acceptance: known-good replaceable-storage image and data/config backup route restore a failed target; credentials are injected from controlled storage
    lifecycle:
      acceptance: OS/security-update horizon, storage replacement, power accessories, imaging route, and equivalent SBC/x86-plus-MCU substitute are reviewed
    cost:
      acceptance: includes power supply, storage, enclosure/cooling if required, display/console access, network arrangement, shared ratio, spares, imaging, and repair

  - id: CAP-DEBUG-PROBE-PROGRAMMER
    planned_use: reusable-swd-jtag-uart-fpga-programming-and-recovery
    reference_ladder: interface-matched-institution-qualified-tool
    learning_actions:
      - identify target voltage and orientation before connection
      - halt, inspect, step, reset, program, verify, and recover supported targets
      - distinguish target power, probe power, signal reference, and isolation limitations
    io_voltage:
      acceptance: target-voltage sensing/supported range, pin ratings, drive behavior, ground, powering, and isolation are explicit; adapters are keyed and strain-relieved
      record: [supported_target_voltage, sensing, output_levels, target_powering, isolation, connector_pinout]
    adc:
      acceptance: not applicable
      record: []
    timers:
      acceptance: interface clock range is configurable and recorded
      record: [swd_jtag_spi_clock_ranges, adaptive_clocking_if_any]
    buses:
      acceptance: exact supported interfaces and voltage constraints match the frozen board set
      record: [swd, jtag, c_jtag_if_any, uart, spi_programming, vendor_specific]
    memory:
      acceptance: probe firmware/configuration version and update/rollback image are archived
      record: [probe_firmware, host_driver, configuration, rollback]
    debug:
      acceptance: required halt/step/breakpoint/register/memory/reset/verify operations pass on applicable boards; clone limitations are separately qualified
      record: [operations, gdb_server, trace_if_any, reset_modes, verify_method]
    radio:
      acceptance: not applicable
      record: []
    logic:
      acceptance: FPGA programming supports the exact device/board flow without undocumented adapters
      record: [fpga_devices, programming_modes, bitstream_verify]
    toolchain:
      acceptance: firmware, USB rules/drivers, server, CLI, debugger integration, licenses, and recovery package work offline on supported hosts
    recovery:
      acceptance: known-good staff probe and adapter can restore each supported board's reversible state; probe itself has a documented recovery route
    lifecycle:
      acceptance: genuine/clone identity, firmware provenance, replaceable cables/adapters, support status, and spare ratio are recorded
    cost:
      acceptance: includes adapters, keyed cables, protective buffers/isolation where required, spares, repair, and shared-access scheduling
