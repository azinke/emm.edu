fixture_contract_id: M03-E2-GOLDEN-FIXTURE-001
version: 1.0.0
status: design-template-not-built
purpose: >-
  Define a board-adapted, current-limited extra-low-voltage fixture for golden
  qualification without asserting that any physical fixture has been built or
  tested.
universal_design_rules:
  - derive every source, sink, resistor, pullup, divider, and clamp value from the exact candidate's documented recommended conditions and current limits
  - include instrument/probe loading and tolerances in predicted ranges
  - key or label voltage domains and connectors; do not rely on wire color alone
  - change board/fixture connections deenergized unless a separately approved live method requires otherwise
  - use accessible test points for board-side and fixture-side measurement
  - permit only reversible safe faults with bounded current and energy
  - do not connect an RF load, antenna, battery, motor, mains, high voltage, or high-energy source under this fixture contract
  - function-check the fixture with a current-limited source before attaching a candidate
