  - unexpected-heating-smell-smoke-noise-or-visible-damage
  - voltage-outside-predeclared-range
  - ambiguous-ground-power-or-io-domain
  - cable-connector-fixture-or-insulation-damage
  - unapproved-radio-transmission
  - requested-operation-would-change-irreversible-state
