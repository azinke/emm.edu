        identifier: "[document/standard/device ID]"
        edition_version_revision: "[exact version]"
        publication_date: YYYY-MM-DD
        locator: "[section/table/page/URL]"
        retrieved_on: YYYY-MM-DD
        archived_copy_or_checksum: "[when permitted]"
        license_or_access_terms: "[terms]"
      independent_checker: "[person different from author]"
      checked_on: YYYY-MM-DD
      result: "[recomputed/measured/source-matched result]"
    assumptions_and_domain: "[conditions, units, tolerance, uncertainty, population and limits]"
    expected_range: "[range and basis when measured]"
    affected_assets:
      en: []
      fr: []
      shared: []
    context_ids: []
    contribution_dossier: null
    reviewer: "[qualified role/person]"
    reviewed_on: YYYY-MM-DD
    review_due: YYYY-MM-DD
    review_trigger: "[new revision/law/platform/tool/price/context data, failed measurement, incident, contradiction, or scheduled cycle]"
    status: proposed # proposed | verified | qualified | superseded | withdrawn
    limitations_to_publish: "[what readers must not infer]"
    paired_correction_issue: null

# A claim is not verified because a URL exists. Primary-source authority,
# independent checking, scope/conditions, affected EN/FR assets, and a currency
# trigger must all match the class and consequence of the claim.
